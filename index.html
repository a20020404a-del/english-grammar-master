<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英文法マスター | 全16ユニット</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&family=Patrick+Hand&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F4EF;
  --sidebar-w:260px;
  --text:#2D3748;
  --muted:#718096;
  --accent:#2B9E95;
  --card-shadow:0 2px 12px rgba(0,0,0,0.07);
  --teal-bg:#E8FAF8;
  --teal-border:#2B9E95;
  --coral-bg:#FFF1F1;
  --coral-border:#E85D5D;
  --gold-bg:#FFFBE6;
  --gold-border:#D4A017;
  --green-bg:#F0FAE8;
  --green-border:#5A9E35;
}
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;left:0;
  width:var(--sidebar-w);
  height:100vh;
  background:linear-gradient(180deg,#2B9E95 0%,#1a7a72 100%);
  color:#fff;
  overflow-y:auto;
  z-index:100;
  display:flex;
  flex-direction:column;
}
.sidebar-header{
  padding:24px 20px 16px;
  border-bottom:1px solid rgba(255,255,255,0.15);
}
.sidebar-title{
  font-size:1.1rem;
  font-weight:700;
  letter-spacing:0.02em;
  line-height:1.3;
}
.sidebar-subtitle{
  font-size:0.75rem;
  opacity:0.75;
  margin-top:4px;
}
.progress-wrap{
  padding:14px 20px;
  border-bottom:1px solid rgba(255,255,255,0.15);
}
.progress-label{
  font-size:0.75rem;
  opacity:0.85;
  margin-bottom:6px;
  display:flex;
  justify-content:space-between;
}
.progress-track{
  height:6px;
  background:rgba(255,255,255,0.2);
  border-radius:999px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  background:#fff;
  border-radius:999px;
  transition:width 0.4s ease;
  width:0%;
}
.nav-list{
  list-style:none;
  padding:10px 0;
  flex:1;
}
.nav-item button{
  width:100%;
  background:none;
  border:none;
  color:#fff;
  padding:9px 20px;
  text-align:left;
  cursor:pointer;
  font-family:'M PLUS Rounded 1c',sans-serif;
  font-size:0.8rem;
  display:flex;
  align-items:center;
  gap:8px;
  transition:background 0.15s;
  line-height:1.3;
}
.nav-item button:hover{background:rgba(255,255,255,0.12)}
.nav-item.active button{
  background:#fff;
  color:var(--accent);
  font-weight:700;
  border-radius:0 20px 20px 0;
  margin-right:12px;
}
.nav-item .done-mark{
  margin-left:auto;
  font-size:0.7rem;
  opacity:0.7;
  flex-shrink:0;
}
.nav-item.completed .done-mark::after{content:"✓"}

/* MAIN */
.main{
  margin-left:var(--sidebar-w);
  padding:32px 40px;
  max-width:calc(var(--sidebar-w) + 860px);
  min-height:100vh;
}

/* UNIT HEADER */
.unit-header{
  margin-bottom:28px;
}
.unit-number{
  font-family:'Orbitron',monospace;
  font-size:0.85rem;
  color:var(--accent);
  font-weight:700;
  letter-spacing:0.1em;
  display:block;
  margin-bottom:6px;
}
.unit-emoji{
  font-size:2.2rem;
  display:block;
  margin-bottom:8px;
}
.unit-title{
  font-size:1.8rem;
  font-weight:700;
  color:var(--text);
  line-height:1.2;
}
.unit-subtitle{
  font-size:0.9rem;
  color:var(--muted);
  margin-top:4px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:12px;
  box-shadow:var(--card-shadow);
  padding:24px 28px;
  margin-bottom:24px;
}
.card-title{
  font-size:1rem;
  font-weight:700;
  color:var(--text);
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:8px;
}

/* RULE BOXES */
.rule-box{
  border-radius:8px;
  padding:16px 18px;
  margin-bottom:14px;
}
.rule-box:last-child{margin-bottom:0}
.rule-box.teal{background:var(--teal-bg);border-left:4px solid var(--teal-border)}
.rule-box.coral{background:var(--coral-bg);border-left:4px solid var(--coral-border)}
.rule-box.gold{background:var(--gold-bg);border-left:4px solid var(--gold-border)}
.rule-box.green{background:var(--green-bg);border-left:4px solid var(--green-border)}
.rule-box-label{
  font-size:0.78rem;
  font-weight:700;
  color:var(--accent);
  text-transform:uppercase;
  letter-spacing:0.05em;
  margin-bottom:6px;
}
.rule-box.coral .rule-box-label{color:var(--coral-border)}
.rule-box.gold .rule-box-label{color:var(--gold-border)}
.rule-box.green .rule-box-label{color:var(--green-border)}
.rule-box p{font-size:0.88rem;line-height:1.65;color:var(--text)}
.en-example{
  font-family:'Patrick Hand',cursive;
  color:var(--accent);
  font-size:0.95rem;
}
.jp-trans{
  font-size:0.78rem;
  color:var(--muted);
  display:block;
  margin-top:2px;
  margin-bottom:4px;
}

/* EXAMPLES TABLE */
.examples-table{
  width:100%;
  border-collapse:collapse;
}
.examples-table td{
  padding:10px 14px;
  vertical-align:top;
  border-bottom:1px solid #F0EDE8;
  font-size:0.88rem;
  line-height:1.55;
}
.examples-table tr:last-child td{border-bottom:none}
.examples-table .en{
  font-family:'Patrick Hand',cursive;
  color:var(--accent);
  font-size:0.95rem;
  width:55%;
}
.examples-table .jp{
  color:var(--muted);
  font-size:0.82rem;
}

/* MISTAKES */
.mistake-row{
  margin-bottom:14px;
  padding-bottom:14px;
  border-bottom:1px solid rgba(232,93,93,0.15);
}
.mistake-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.mistake-en-wrong{font-family:'Patrick Hand',cursive;color:var(--coral-border);font-size:0.95rem}
.mistake-en-right{font-family:'Patrick Hand',cursive;color:var(--green-border);font-size:0.95rem}
.mistake-jp{font-size:0.78rem;color:var(--muted);display:block;margin-top:1px}
.mistake-note{font-size:0.78rem;color:var(--muted);margin-top:4px;font-style:italic}

/* QUIZ */
.quiz-item{
  background:#F9F8F6;
  border-radius:8px;
  padding:14px 16px;
  margin-bottom:12px;
  cursor:pointer;
  border:1px solid #EDE8E0;
  transition:background 0.15s;
}
.quiz-item:hover{background:#F2EFE9}
.quiz-item:last-child{margin-bottom:0}
.quiz-prompt{
  font-size:0.88rem;
  font-weight:500;
  color:var(--text);
  margin-bottom:4px;
}
.quiz-prompt::before{
  content:"Q. ";
  color:var(--accent);
  font-weight:700;
}
.quiz-hint{
  font-size:0.75rem;
  color:var(--muted);
}
.quiz-answer{
  display:none;
  margin-top:10px;
  padding-top:10px;
  border-top:1px dashed #D4CFC7;
}
.quiz-answer.visible{display:block}
.quiz-answer .ans-en{
  font-family:'Patrick Hand',cursive;
  color:var(--accent);
  font-size:1rem;
}
.quiz-answer .ans-note{
  font-size:0.78rem;
  color:var(--muted);
  margin-top:4px;
  display:block;
}

/* DONE BUTTON */
.done-btn-wrap{
  text-align:right;
  margin-top:8px;
  margin-bottom:40px;
}
.done-btn{
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:999px;
  padding:10px 28px;
  font-family:'M PLUS Rounded 1c',sans-serif;
  font-size:0.9rem;
  font-weight:700;
  cursor:pointer;
  transition:background 0.2s,transform 0.1s;
}
.done-btn:hover{background:#1a7a72}
.done-btn:active{transform:scale(0.97)}
.done-btn.completed{background:#5A9E35}

/* MOBILE */
@media(max-width:768px){
  .sidebar{
    position:relative;
    width:100%;
    height:auto;
    flex-direction:column;
  }
  .nav-list{display:flex;flex-wrap:wrap;padding:8px}
  .nav-item button{padding:6px 12px;font-size:0.75rem;border-radius:20px;width:auto}
  .nav-item.active button{margin-right:0}
  .main{margin-left:0;padding:20px 16px;max-width:100%}
}
</style>
</head>
<body>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">英文法マスター</div>
    <div class="sidebar-subtitle">全16ユニット完全版</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-label">
      <span>進捗</span>
      <span id="progress-text">0 / 16</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>
  <ul class="nav-list" id="nav-list"></ul>
</nav>

<main class="main" id="main-content"></main>

      {w:{en:"I like both cats or dogs."},r:{en:"I like both cats and dogs.",jp:"猫も犬も好きです。"},note:"both〜andはセット"},
    ],
    tip:"「despite＋名詞、although＋節（主語＋動詞）」——混同しやすいペアを覚えよう！あとboth〜and、either〜or、neither〜norはセットで覚える🎭",
    quiz:[
      {q:"彼は疲れていたので、早く寝ました。",a:"He went to bed early because he was tired.",n:"理由のbecause"},
      {q:"音楽も映画も好きです。",a:"I like both music and movies.",n:"相関接続詞 both A and B"},
      {q:"一生懸命練習すれば、上手くなれます。",a:"If you practice hard, you will get better.",n:"条件のif（条件節は現在形）"},
      {q:"彼は英語だけでなくフランス語も話せます。",a:"He can speak not only English but also French.",n:"相関接続詞 not only A but also B"},
      {q:"私が駅に着いたとき、電車はすでに出発していました。",a:"When I arrived at the station, the train had already left.",n:"時の接続詞when＋過去完了"},
    ]
  },
];

let currentUnit = 1;
let completedUnits = new Set(JSON.parse(localStorage.getItem('grammarCompleted')||'[]'));

function saveCompleted(){
  localStorage.setItem('grammarCompleted', JSON.stringify([...completedUnits]));
}

function updateProgress(){
  const done = completedUnits.size;
  document.getElementById('progress-text').textContent = done + ' / 16';
  document.getElementById('progress-fill').style.width = (done / 16 * 100) + '%';
  UNITS.forEach(u => {
    const li = document.getElementById('nav-' + u.id);
    if(!li) return;
    if(completedUnits.has(u.id)) li.classList.add('completed');
    else li.classList.remove('completed');
  });
}

function buildNav(){
  const nl = document.getElementById('nav-list');
  UNITS.forEach(u => {
    const li = document.createElement('li');
    li.className = 'nav-item';
    li.id = 'nav-' + u.id;
    const btn = document.createElement('button');
    btn.innerHTML = `<span>${u.emoji}</span><span>Unit ${u.id} ${u.title}</span><span class="done-mark"></span>`;
    btn.addEventListener('click', () => showUnit(u.id));
    li.appendChild(btn);
    nl.appendChild(li);
  });
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderPoints(points){
  return points.map(p => {
    const exHtml = (p.exs||[]).map(e =>
      `<div style="margin-top:6px"><span class="en-example">${esc(e.en)}</span>${e.jp ? `<span class="jp-trans">${esc(e.jp)}</span>` : ''}</div>`
    ).join('');
    return `<div class="rule-box ${p.c}">
      <div class="rule-box-label">${esc(p.label)}</div>
      <p>${esc(p.body)}</p>
      ${exHtml}
    </div>`;
  }).join('');
}

function renderExamplesTable(examples){
  return `<table class="examples-table">${examples.map(e =>
    `<tr><td class="en">${esc(e.en)}</td><td class="jp">${esc(e.jp)}</td></tr>`
  ).join('')}</table>`;
}

function renderMistakes(mistakes){
  return mistakes.map(m =>
    `<div class="mistake-row">
      <div style="margin-bottom:3px"><span style="color:#E85D5D;font-weight:700;margin-right:4px">✗</span><span class="mistake-en-wrong">${esc(m.w.en)}</span></div>
      <div style="margin-bottom:3px"><span style="color:#5A9E35;font-weight:700;margin-right:4px">✓</span><span class="mistake-en-right">${esc(m.r.en)}</span>${m.r.jp ? `<span class="mistake-jp">${esc(m.r.jp)}</span>` : ''}</div>
      <div class="mistake-note">${esc(m.note)}</div>
    </div>`
  ).join('');
}

function renderQuiz(quiz){
  return quiz.map((q, i) =>
    `<div class="quiz-item" onclick="toggleQuiz(this)">
      <div class="quiz-prompt">${esc(q.q)}</div>
      <div class="quiz-hint">クリックして答えを確認</div>
      <div class="quiz-answer">
        <div class="ans-en">${esc(q.a)}</div>
        <span class="ans-note">${esc(q.n)}</span>
      </div>
    </div>`
  ).join('');
}

function showUnit(id){
  currentUnit = id;
  const u = UNITS.find(x => x.id === id);

  document.querySelectorAll('.nav-item').forEach(li => li.classList.remove('active'));
  const activeNav = document.getElementById('nav-' + id);
  if(activeNav) activeNav.classList.add('active');

  const isDone = completedUnits.has(id);

  const html = `
    <div class="unit-header">
      <span class="unit-number">UNIT ${String(id).padStart(2,'0')}</span>
      <span class="unit-emoji">${u.emoji}</span>
      <div class="unit-title">${esc(u.title)}</div>
      <div class="unit-subtitle">${esc(u.subtitle)}</div>
    </div>

    <div class="card">
      <div class="rule-box teal" style="margin-bottom:0">
        <p>${u.intro}</p>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Key Points</div>
      ${renderPoints(u.points)}
    </div>

    <div class="card">
      <div class="card-title">例文</div>
      ${renderExamplesTable(u.examples)}
    </div>

    <div class="card">
      <div class="rule-box coral" style="margin-bottom:0">
        <div class="rule-box-label">❌ よくある間違い</div>
        ${renderMistakes(u.mistakes)}
      </div>
    </div>

    <div class="card">
      <div class="rule-box gold" style="margin-bottom:0">
        <div class="rule-box-label">💡 覚え方のコツ</div>
        <p>${u.tip}</p>
      </div>
    </div>

    <div class="card">
      <div class="card-title">クイズ（5問）</div>
      <p style="font-size:0.82rem;color:var(--muted);margin-bottom:14px">日本語を見て英語の答えを考えてから、クリックして確認しよう！</p>
      ${renderQuiz(u.quiz)}
    </div>

    <div class="done-btn-wrap">
      <button class="done-btn${isDone?' completed':''}" id="done-btn-${id}" onclick="markDone(${id})">
        ${isDone ? '✓ 完了済み' : 'このユニットを完了にする'}
      </button>
    </div>
  `;

  document.getElementById('main-content').innerHTML = html;
  window.scrollTo({top:0, behavior:'smooth'});
  updateProgress();
}

function toggleQuiz(el){
  const ans = el.querySelector('.quiz-answer');
  const hint = el.querySelector('.quiz-hint');
  const showing = ans.classList.toggle('visible');
  hint.style.display = showing ? 'none' : 'block';
}

function markDone(id){
  if(completedUnits.has(id)) completedUnits.delete(id);
  else completedUnits.add(id);
  saveCompleted();
  updateProgress();
  const btn = document.getElementById('done-btn-' + id);
  if(btn){
    const isDone = completedUnits.has(id);
    btn.textContent = isDone ? '✓ 完了済み' : 'このユニットを完了にする';
    btn.className = 'done-btn' + (isDone ? ' completed' : '');
  }
}

buildNav();
showUnit(1);
</script>
</body>
</html>
