<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAMMAR//OS — 英文法システム v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;500;700&family=Patrick+Hand&family=Orbitron:wght@400;600;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080C18;
  --panel: rgba(12,18,36,0.95);
  --cyan: #4ECDC4;
  --coral: #FF6B6B;
  --gold: #FFE66D;
  --green: #A8E063;
  --text: #EDF2F7;
  --muted: #718096;
  --border: rgba(78,205,196,0.2);
  --sidebar-w: 270px;
}
*{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--cyan);border-radius:2px}
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:.3;pointer-events:none}
.layout{display:flex;min-height:100vh;position:relative;z-index:1}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar-w);
  min-width:var(--sidebar-w);
  background:rgba(8,12,24,0.97);
  border-right:1px solid var(--border);
  position:fixed;
  top:0;left:0;bottom:0;
  overflow-y:auto;
  z-index:100;
  display:flex;
  flex-direction:column;
}
.sidebar-logo{
  padding:24px 20px 16px;
  border-bottom:1px solid var(--border);
}
.sidebar-logo .sys-title{
  font-family:'Orbitron',sans-serif;
  font-size:13px;
  color:var(--cyan);
  letter-spacing:3px;
  display:block;
}
.sidebar-logo .sys-sub{
  font-family:'Space Mono',monospace;
  font-size:10px;
  color:var(--muted);
  margin-top:4px;
  display:block;
}
.progress-wrap{padding:14px 20px;border-bottom:1px solid var(--border)}
.progress-label{
  font-family:'Space Mono',monospace;
  font-size:9px;
  color:var(--muted);
  letter-spacing:2px;
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}
.progress-bar{height:3px;background:rgba(78,205,196,0.15);border-radius:2px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:2px;transition:width .4s}
.unit-list{padding:8px 0;flex:1}
.unit-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 20px;
  cursor:pointer;
  transition:all .2s;
  border-left:3px solid transparent;
  font-size:12.5px;
  color:var(--muted);
}
.unit-item:hover{background:rgba(78,205,196,0.06);color:var(--text)}
.unit-item.active{
  border-left-color:var(--cyan);
  background:rgba(78,205,196,0.1);
  color:var(--cyan);
}
.unit-item .unit-num{
  font-family:'Orbitron',sans-serif;
  font-size:10px;
  color:inherit;
  min-width:28px;
}
.unit-item .unit-done{color:var(--green);margin-left:auto;font-size:11px}

/* ── MAIN ── */
.main{
  margin-left:var(--sidebar-w);
  flex:1;
  padding:40px 48px 80px;
  max-width:960px;
}

/* ── UNIT PANEL ── */
.unit-panel{display:none}
.unit-panel.active{display:block}

/* ── UNIT HEADER ── */
.unit-header{
  display:flex;align-items:center;gap:24px;
  padding:32px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  margin-bottom:24px;
  position:relative;
  overflow:hidden;
}
.unit-header::before{
  content:'';position:absolute;top:0;right:0;width:200px;height:100%;
  background:radial-gradient(ellipse at right,rgba(78,205,196,0.08),transparent 70%);
}
.unit-icon{width:64px;height:64px;flex-shrink:0}
.unit-meta{}
.unit-num-label{
  font-family:'Orbitron',sans-serif;
  font-size:11px;
  color:var(--cyan);
  letter-spacing:3px;
  opacity:.8;
}
.unit-title{
  font-family:'M PLUS Rounded 1c',sans-serif;
  font-size:26px;
  font-weight:700;
  color:var(--text);
  margin:4px 0 2px;
}
.unit-subtitle{
  font-family:'Space Mono',monospace;
  font-size:11px;
  color:var(--muted);
}

/* ── CARDS ── */
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:28px;
  margin-bottom:20px;
}
.card-title{
  font-family:'Space Mono',monospace;
  font-size:10px;
  letter-spacing:3px;
  color:var(--cyan);
  margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.card-title::before{content:'//';opacity:.5}

/* intro card */
.intro-card{
  background:linear-gradient(135deg,rgba(12,18,36,0.98),rgba(20,30,60,0.95));
  border-color:rgba(78,205,196,0.3);
  font-size:15px;
  line-height:1.85;
}
.intro-card p{margin-bottom:8px}

/* rule box */
.rule-box{
  border-radius:10px;
  padding:18px 20px;
  margin-bottom:14px;
}
.rule-box.cyan{border:1px solid rgba(78,205,196,0.4);background:rgba(78,205,196,0.05)}
.rule-box.coral{border:1px solid rgba(255,107,107,0.4);background:rgba(255,107,107,0.05)}
.rule-box.gold{border:1px solid rgba(255,230,109,0.4);background:rgba(255,230,109,0.05)}
.rule-box.green{border:1px solid rgba(168,224,99,0.4);background:rgba(168,224,99,0.05)}
.rule-box h4{
  font-size:14px;font-weight:700;margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}
.rule-box p,.rule-box li{font-size:13.5px;line-height:1.8;color:rgba(237,242,247,0.9)}
.rule-box ul{padding-left:18px}

/* structure diagram */
.diagram{
  display:flex;align-items:center;gap:6px;
  flex-wrap:wrap;
  margin:12px 0;
  font-family:'Space Mono',monospace;
  font-size:12px;
}
.box-s{background:rgba(78,205,196,0.2);border:1px solid var(--cyan);color:var(--cyan);padding:4px 10px;border-radius:6px}
.box-v{background:rgba(255,107,107,0.2);border:1px solid var(--coral);color:var(--coral);padding:4px 10px;border-radius:6px}
.box-o{background:rgba(255,230,109,0.2);border:1px solid var(--gold);color:var(--gold);padding:4px 10px;border-radius:6px}
.box-c{background:rgba(168,224,99,0.2);border:1px solid var(--green);color:var(--green);padding:4px 10px;border-radius:6px}
.box-n{background:rgba(150,150,200,0.15);border:1px solid rgba(150,150,200,0.4);color:#a0aec0;padding:4px 10px;border-radius:6px}
.arrow{color:var(--muted);font-size:14px;font-weight:700}

/* examples table */
.ex-table{width:100%;border-collapse:collapse;font-size:13.5px}
.ex-table th{
  font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;
  color:var(--muted);padding:8px 12px;border-bottom:1px solid var(--border);
  text-align:left;
}
.ex-table td{padding:10px 12px;border-bottom:1px solid rgba(78,205,196,0.07);vertical-align:top}
.ex-table tr:last-child td{border-bottom:none}
.ex-en{font-family:'Patrick Hand',cursive;font-size:15px;color:var(--cyan)}
.ex-ja{color:rgba(237,242,247,0.75);font-size:12.5px;margin-top:2px}
.ex-em{font-size:18px}

/* mistakes card */
.mistakes-card{border-color:rgba(255,107,107,0.35);background:rgba(255,107,107,0.04)}
.mistake-item{margin-bottom:12px;font-size:13.5px;line-height:1.75}
.wrong{color:var(--coral)}.right{color:var(--green)}

/* memory tip */
.tip-card{border-color:rgba(255,230,109,0.4);background:rgba(255,230,109,0.04)}
.tip-content{font-size:14.5px;line-height:1.8;color:rgba(255,230,109,0.95)}

/* quiz */
.quiz-card{}
.quiz-q{
  background:rgba(78,205,196,0.05);
  border:1px solid rgba(78,205,196,0.15);
  border-radius:10px;
  padding:16px 18px;
  margin-bottom:12px;
  cursor:pointer;
  transition:all .2s;
}
.quiz-q:hover{border-color:rgba(78,205,196,0.35);background:rgba(78,205,196,0.09)}
.quiz-q .q-num{font-family:'Orbitron',sans-serif;font-size:9px;color:var(--cyan);letter-spacing:2px;margin-bottom:6px}
.quiz-q .q-ja{font-size:14px;margin-bottom:4px}
.quiz-q .q-hint{font-size:11px;color:var(--muted)}
.quiz-answer{
  margin-top:10px;padding:12px 14px;
  background:rgba(168,224,99,0.07);
  border-radius:8px;border:1px solid rgba(168,224,99,0.25);
  display:none;
}
.quiz-answer.revealed{display:block}
.quiz-answer .ans-en{font-family:'Patrick Hand',cursive;font-size:17px;color:var(--green);margin-bottom:4px}
.quiz-answer .ans-note{font-size:12px;color:rgba(237,242,247,0.65);line-height:1.7}
.quiz-toggle{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:6px}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{
    position:relative;width:100%;min-width:unset;
    border-right:none;border-bottom:1px solid var(--border);
    max-height:280px;
  }
  .layout{flex-direction:column}
  .main{margin-left:0;padding:24px 16px 60px}
  .unit-header{flex-direction:column;text-align:center;padding:20px}
  .diagram{justify-content:center}
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="layout">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <span class="sys-title">GRAMMAR//OS</span>
    <span class="sys-sub">英文法学習システム v2.0</span>
  </div>
  <div class="progress-wrap">
    <div class="progress-label"><span>PROGRESS</span><span id="prog-pct">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <nav class="unit-list" id="unit-nav"></nav>
</aside>

<!-- MAIN -->
<main class="main" id="main-content"></main>

</div>

<script>
// ── CANVAS BACKGROUND ──
(function(){
  const c=document.getElementById('bg-canvas');
  const ctx=c.getContext('2d');
  let W,H,particles=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  for(let i=0;i<70;i++)particles.push({
    x:Math.random()*2000,y:Math.random()*2000,
    vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
    r:Math.random()*1.5+.5,op:Math.random()*.5+.2
  });
  function draw(){
    ctx.clearRect(0,0,W,H);
    // grid
    ctx.strokeStyle='rgba(78,205,196,0.04)';ctx.lineWidth=1;
    for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
    for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
    // particles
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(78,205,196,${p.op})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── UNIT DATA ──
const UNITS = [
  {
    id:1, title:'主語・動詞・基本文型', subtitle:'The 5 Sentence Patterns',
    icon:`<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="20" width="16" height="24" rx="4" fill="rgba(78,205,196,0.2)" stroke="#4ECDC4" stroke-width="1.5"/><text x="12" y="36" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ECDC4">S</text><rect x="24" y="20" width="16" height="24" rx="4" fill="rgba(255,107,107,0.2)" stroke="#FF6B6B" stroke-width="1.5"/><text x="32" y="36" text-anchor="middle" font-family="monospace" font-size="9" fill="#FF6B6B">V</text><rect x="44" y="20" width="16" height="24" rx="4" fill="rgba(255,230,109,0.2)" stroke="#FFE66D" stroke-width="1.5"/><text x="52" y="36" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFE66D">O</text><line x1="20" y1="32" x2="24" y2="32" stroke="#718096" stroke-width="1.5"/><line x1="40" y1="32" x2="44" y2="32" stroke="#718096" stroke-width="1.5"/></svg>`,
    intro:`英語は「語順が命！」の言語です。🌟 日本語では「りんごを私は食べた」でも通じるけど、英語では語順を変えると意味が変わったり、文が崩れてしまう。<br>全部で5つの基本文型パターンがある。これをマスターすれば、どんな英文も読み書きできるようになります！`,
    rules:[
      {color:'cyan',title:'📐 5つの基本文型',content:`
        <div class="diagram"><span class="box-s">S 主語</span><span class="arrow">+</span><span class="box-v">V 動詞</span></div>
        <p><b>SV型</b>: He runs. / The sun rises.</p>
        <div class="diagram"><span class="box-s">S</span><span class="arrow">+</span><span class="box-v">V</span><span class="arrow">+</span><span class="box-c">C 補語</span></div>
        <p><b>SVC型</b>: She is beautiful. / He looks happy.</p>
        <div class="diagram"><span class="box-s">S</span><span class="arrow">+</span><span class="box-v">V</span><span class="arrow">+</span><span class="box-o">O 目的語</span></div>
        <p><b>SVO型</b>: I like music. / She reads books.</p>
        <div class="diagram"><span class="box-s">S</span><span class="arrow">+</span><span class="box-v">V</span><span class="arrow">+</span><span class="box-o">O1</span><span class="arrow">+</span><span class="box-o">O2</span></div>
        <p><b>SVOO型</b>: He gave me a gift. / She told him the truth.</p>
        <div class="diagram"><span class="box-s">S</span><span class="arrow">+</span><span class="box-v">V</span><span class="arrow">+</span><span class="box-o">O</span><span class="arrow">+</span><span class="box-c">C</span></div>
        <p><b>SVOC型</b>: They call him Tom. / She made me happy.</p>`},
      {color:'coral',title:'❓ 疑問文と否定文の作り方',content:`
        <p><b>be動詞の文</b>: Is she happy? / She is not happy.</p>
        <p><b>一般動詞の文</b>: Do you like coffee? / I don't like coffee.</p>
        <p><b>3人称単数現在</b>: Does he play tennis? / He doesn't play.</p>`}
    ],
    examples:[
      {en:'I love you.',ja:'私はあなたを愛しています。',em:'💕'},
      {en:'She gave me a beautiful flower.',ja:'彼女は私に美しい花をくれた。',em:'🌸'},
      {en:'They call this place paradise.',ja:'彼らはここを楽園と呼ぶ。',em:'🌴'},
      {en:'Does he play the guitar?',ja:'彼はギターを弾きますか？',em:'🎸'},
      {en:"I don't know the answer.",ja:'私はその答えを知らない。',em:'🤔'},
    ],
    mistakes:[
      {wrong:'Me like cats.',right:'I like cats. 　→ 主語は目的格でなく主格を使う'},
      {wrong:'She not play tennis.',right:"She doesn't play tennis. 　→ 否定は don't/doesn't を使う"},
      {wrong:'Likes he music?',right:'Does he like music? 　→ 疑問文では do/does を先に置く'},
    ],
    tip:'英語は最初に結論を言う言語！「主語＋動詞」を先に言えば伝わる。日本語みたいに最後まで動詞を引っ張らなくてOK！ 🚀'
  },
  {
    id:2, title:'名詞', subtitle:'Countable, Uncountable & Articles',
    icon:`<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="28" r="10" fill="rgba(255,230,109,0.15)" stroke="#FFE66D" stroke-width="1.5"/><text x="20" y="32" text-anchor="middle" font-size="12" fill="#FFE66D">a</text><circle cx="44" cy="28" r="10" fill="rgba(78,205,196,0.15)" stroke="#4ECDC4" stroke-width="1.5"/><text x="44" y="32" text-anchor="middle" font-size="12" fill="#4ECDC4">the</text><line x1="30" y1="28" x2="34" y2="28" stroke="#718096" stroke-width="1.5"/></svg>`,
    intro:`日本語では「りんごください」でOKだけど、英語は数をいつも意識する言語！🍎 「ひとつのりんご」なのか「りんご全般」なのかで言い方が変わる。<br>冠詞（a/the）は最初は難しく感じるけど、ルールを覚えれば自然に使えるようになります！`,
    rules:[
      {color:'cyan',title:'🔢 可算名詞と不可算名詞',content:`
        <p><b>可算名詞（数えられる）</b>: apple → an apple / two apples</p>
        <p><b>不可算名詞（数えられない）</b>: water, air, music, information, advice, news, money, time</p>
        <p style="margin-top:8px">💡 不可算名詞は「器」で数える：a glass of water / a piece of advice / a bit of information</p>`},
      {color:'gold',title:'📌 冠詞の選び方',content:`
        <div class="diagram"><span class="box-n">初出・不特定</span><span class="arrow">→</span><span class="box-o">a / an</span></div>
        <div class="diagram"><span class="box-n">2回目以降・特定</span><span class="arrow">→</span><span class="box-o">the</span></div>
        <div class="diagram"><span class="box-n">総称・固有名詞など</span><span class="arrow">→</span><span class="box-n">無冠詞</span></div>
        <p style="margin-top:8px"><b>a vs an</b>: 次の音が母音（a,e,i,o,u）なら an → an apple, an hour</p>`},
    ],
    examples:[
      {en:'I saw a dog in the park.',ja:'公園で（1匹の）犬を見た。→ 次に The dog was huge.',em:'🐕'},
      {en:'Can I have a glass of water?',ja:'水を一杯もらえますか？',em:'💧'},
      {en:'Music is my passion.',ja:'音楽は私の情熱です。（無冠詞＝音楽全般）',em:'🎵'},
      {en:'She gave me good advice.',ja:'彼女はよいアドバイスをくれた。（adviceは不可算）',em:'💡'},
      {en:'The sun rises in the east.',ja:'太陽は東から昇る。（唯一のものにはthe）',em:'🌅'},
    ],
    mistakes:[
      {wrong:'I need an advice.',right:'I need advice. 　→ advice は不可算名詞、aはつけない'},
      {wrong:'She is teacher.',right:'She is a teacher. 　→ 職業・役割には冠詞が必要'},
      {wrong:'I like the music.',right:'I like music. 　→ 音楽全般の話には冠詞不要'},
    ],
    tip:'水・空気・音楽・情報は数えられない。でも "a piece of advice" のように器で数えられる。不可算名詞リストは音楽・ニュース・天気・言語・教科・スポーツが多い！✨'
  },
  {
    id:3, title:'形容詞', subtitle:'Adjectives & Their Positions',
    icon:`<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="24" width="48" height="16" rx="8" fill="rgba(168,224,99,0.15)" stroke="#A8E063" stroke-width="1.5"/><text x="32" y="36" text-anchor="middle" font-family="monospace" font-size="10" fill="#A8E063">beautiful</text><rect x="14" y="14" width="16" height="12" rx="3" fill="rgba(78,205,196,0.15)" stroke="#4ECDC4" stroke-width="1"/><text x="22" y="23" text-anchor="middle" font-size="8" fill="#4ECDC4">attr.</text><rect x="34" y="38" width="16" height="12" rx="3" fill="rgba(255,107,107,0.15)" stroke="#FF6B6B" stroke-width="1"/><text x="42" y="47" text-anchor="middle" font-size="8" fill="#FF6B6B">pred.</text></svg>`,
    intro:`名詞をかっこよく説明する言葉が形容詞！🎨 英語では置く場所が2パターンある。<br>さらに "-ed" と "-ing" の使い分けで日本人学習者がよく間違えるポイントがある。ここをしっかり押さえよう！`,
    rules:[
      {color:'cyan',title:'📍 2つの置き場所',content:`
        <div class="diagram"><span class="box-c">形容詞</span><span class="arrow">+</span><span class="box-n">名詞</span><span class="arrow">→</span><span class="box-n">限定用法</span></div>
        <p>a <b>beautiful</b> flower / an <b>interesting</b> book</p>
        <div class="diagram"><span class="box-s">S</span><span class="arrow">+</span><span class="box-v">be動詞</span><span class="arrow">+</span><span class="box-c">形容詞</span><span class="arrow">→</span><span class="box-n">叙述用法</span></div>
        <p>The flower is <b>beautiful</b>. / The book seems <b>interesting</b>.</p>`},
      {color:'coral',title:'🔴 形容詞の順番（複数ある場合）',content:`
        <div class="diagram"><span class="box-n">数量</span><span class="arrow">→</span><span class="box-n">意見</span><span class="arrow">→</span><span class="box-n">大きさ</span><span class="arrow">→</span><span class="box-n">年齢</span><span class="arrow">→</span><span class="box-n">色</span><span class="arrow">→</span><span class="box-n">国籍</span><span class="arrow">→</span><span class="box-n">素材</span></div>
        <p>a lovely small old red Italian wooden box ✓</p>`},
      {color:'gold',title:'⚡ -ed vs -ing 形容詞',content:`
        <p><b>-ed</b>（〜された・〜と感じている） → 人の感情・状態</p>

        <p style="margin-top:8px"><b>-ing</b>（〜させる・〜な性質を持つ） → 物・状況の性質</p>
        <p>This movie is <b>boring</b>. / The instructions are <b>confusing</b>.</p>`},
    ],
    examples:[
      {en:'She wore a beautiful red Italian dress.',ja:'彼女は美しい赤いイタリアのドレスを着ていた。',em:'👗'},
      {en:"I'm interested in Japanese culture.",ja:'私は日本文化に興味があります。（自分が興味を持っている）',em:'🗾'},
      {en:'This lecture is interesting.',ja:'この講義は面白い。（講義が面白い性質を持つ）',em:'📚'},
      {en:'The news was surprising.',ja:'そのニュースは驚くべきものだった。',em:'📰'},
      {en:'She felt exhausted after the run.',ja:'走った後、彼女はぐったりした。',em:'🏃'},
    ],
    mistakes:[
      {wrong:"I'm boring.",right:"I'm bored. 　→ boringは「退屈させる人」になってしまう！"},
      {wrong:"It was very interest.",right:'It was very interesting. 　→ 形容詞形の -ing を使う'},
      {wrong:'She is confuse.',right:'She is confused. 　→ 過去分詞 -ed で形容詞にする'},

    tip:'人が感じる→-ed形、物や状況が持つ性質→-ing形。「自分がbored（退屈している）な時は、状況がboring（退屈させる）」とセットで覚えよう！🧠'
  },
  {
    id:4, title:'副詞', subtitle:'Adverbs & Their Positions',
    icon:`<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="28" width="28" height="14" rx="4" fill="rgba(255,107,107,0.15)" stroke="#FF6B6B" stroke-width="1.5"/><text x="22" y="38" text-anchor="middle" font-size="9" fill="#FF6B6B">quickly</text><path d="M36 22 L56 22 M36 35 L56 35 M36 48 L56 48" stroke="#4ECDC4" stroke-width="1.5" stroke-linecap="round"/><circle cx="48" cy="22" r="3" fill="#4ECDC4"/><circle cx="40" cy="35" r="3" fill="#FFE66D"/><circle cx="53" cy="48" r="3" fill="#A8E063"/></svg>`,
    intro:`動詞や形容詞をパワーアップさせる言葉が副詞！⚡ 「どのように」「いつ」「どのくらい」などを表す。<br>使いこなすと表現がぐっと豊かになるし、位置のルールを覚えると自然な英語が書けるようになります！`,
    rules:[
      {color:'cyan',title:'🏃 様態の副詞（-ly）',content:`
        <p>動詞の直後か文末に置く。</p>
        <p>She sings <b>beautifully</b>. / He ran <b>quickly</b>.</p>
        <p style="margin-top:8px">⚠️ 注意：<b>hard</b>（一生懸命）vs <b>hardly</b>（ほとんど〜ない）</p>
        <p><b>late</b>（遅く）vs <b>lately</b>（最近）</p>`},
      {color:'gold',title:'📊 頻度の副詞',content:`
        <div class="diagram"><span class="box-n">always</span><span class="arrow">→</span><span class="box-n">usually</span><span class="arrow">→</span><span class="box-n">often</span><span class="arrow">→</span><span class="box-n">sometimes</span><span class="arrow">→</span><span class="box-n">rarely</span><span class="arrow">→</span><span class="box-n">never</span></div>
        <p>100%→→→→→→→→→→→→→→ 0%</p>
        <p style="margin-top:8px"><b>位置</b>: be動詞の<b>後</b>、一般動詞の<b>前</b></p>
        <p>She <b>is always</b> late. / He <b>usually goes</b> by train.</p>`},
      {color:'coral',title:'⚡ 程度の副詞',content:`
        <p><b>very</b>: She is very tall. （通常の形容詞・副詞を強調）</p>
        <p><b>too</b>: It's too hot. （程度が過ぎる・マイナスニュアンス）</p>
        <p><b>quite</b>: It's quite good. （かなり・まあまあ）</p>
        <p><b>enough</b>: She's old enough. 　← 形容詞の<b>後</b>に置く！</p>`},
    ],
    examples:[
      {en:'She always drinks coffee in the morning.',ja:'彼女はいつも朝コーヒーを飲む。',em:'☕'},
      {en:'He works very hard.',ja:'彼はとても一生懸命働く。（hard=一生懸命）',em:'💪'},
      {en:"I haven't seen him lately.",ja:'最近、彼に会っていない。（lately=最近）',em:'👀'},
      {en:"You're speaking too fast.",ja:'あなたは話すのが速すぎる。',em:'🏎️'},
      {en:'She sings incredibly well.',ja:'彼女は信じられないくらい上手く歌う。',em:'🎤'},
    ],
    mistakes:[
      {wrong:'She works hardly.',right:'She works hard. 　→ hardly は「ほとんど〜ない」の意味になる！'},
      {wrong:'He always is late.',right:'He is always late. 　→ 頻度副詞はbe動詞の後'},
      {wrong:"I'm enough old.",right:"I'm old enough. 　→ enough は形容詞・副詞の後に置く"},
    ],
    tip:'頻度副詞の位置は「be動詞の後・一般動詞の前」！ これだけ覚えれば8割OK。"always be"と"always go"の違いで確認しよう！📌'
  },
  {
    id:5, title:'比較', subtitle:'Comparatives & Superlatives',
    icon:`<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="40" width="12" height="16" rx="2" fill="rgba(78,205,196,0.2)" stroke="#4ECDC4" stroke-width="1.5"/><rect x="22" y="30" width="12" height="26" rx="2" fill="rgba(255,230,109,0.2)" stroke="#FFE66D" stroke-width="1.5"/><rect x="38" y="16" width="12" height="40" rx="2" fill="rgba(168,224,99,0.2)" stroke="#A8E063" stroke-width="1.5"/><line x1="4" y1="58" x2="60" y2="58" stroke="#718096" stroke-width="1"/></svg>`,
    intro:`「AはBより〜」「いちばん〜」の3パターン。日常会話で超よく使う！📊<br>比較表現をマスターすれば、物事を説明したり比べたりする表現が一気に広がります。不規則変化も一緒に覚えよう！`,
    rules:[
      {color:'cyan',title:'⚖️ 3つの比較パターン',content:`
        <div class="diagram"><span class="box-n">as</span><span class="arrow">+</span><span class="box-c">形容詞</span><span class="arrow">+</span><span class="box-n">as</span><span class="arrow">→</span><span class="box-n">同等比較</span></div>
        <p>She is <b>as tall as</b> her brother. （〜と同じくらい）</p>
        <div class="diagram"><span class="box-c">形容詞-er / more+形容詞</span><span class="arrow">+</span><span class="box-n">than</span><span class="arrow">→</span><span class="box-n">比較級</span></div>
        <p>He is <b>taller than</b> me. / It is <b>more expensive than</b> I thought.</p>
        <div class="diagram"><span class="box-n">the</span><span class="arrow">+</span><span class="box-c">形容詞-est / most+形容詞</span><span class="arrow">→</span><span class="box-n">最上級</span></div>
        <p>She is <b>the tallest</b> in the class. / This is <b>the most beautiful</b> view.</p>`},
      {color:'gold',title:'📏 -er/-est か more/most か',content:`
        <p><b>短い形容詞</b>（1〜2音節）→ <b>-er / -est</b></p>
        <p>tall→taller→tallest / hot→hotter→hottest</p>
        <p style="margin-top:8px"><b>長い形容詞</b>（3音節以上）→ <b>more / most</b></p>
        <p>beautiful→more beautiful→most beautiful</p>
        <p style="margin-top:8px"><b>不規則変化</b>: good→better→best / bad→worse→worst / many/much→more→most / little→less→least</p>`},
      {color:'coral',title:'💪 比較の強調',content:`
        <p><b>much / far / a lot</b> + 比較級で「ずっと〜」</p>
        <p>This is <b>much better</b> than before. / She is <b>far more</b> talented.</p>`},
    ],
    examples:[
      {en:'Tokyo is bigger than Osaka.',ja:'東京は大阪より大きい。',em:'🏙️'},
      {en:'This is the most delicious food I have ever eaten.',ja:'これは今まで食べた中で最もおいしい食べ物だ。',em:'😋'},
      {en:'She speaks English as fluently as a native speaker.',ja:'彼女はネイティブと同じくらい流暢に英語を話す。',em:'🗣️'},
      {en:'The situation is getting worse and worse.',ja:'状況はどんどん悪化している。',em:'📉'},
      {en:'The more you practice, the better you get.',ja:'練習すればするほど、上手くなる。',em:'🎯'},
    ],
    mistakes:[
      {wrong:'She is more taller than me.',right:'She is taller than me. 　→ -er と more は一緒に使わない'},
      {wrong:'This is the most best option.',right:'This is the best option. 　→ best はすでに最上級'},
      {wrong:'He is more good at math.',right:'He is better at math. 　→ good の比較級は better'},
    ],
    tip:'短い形容詞（1〜2音節）→-er/-est、長い形容詞（3音節以上）→more/most！ 迷ったら音節を数えよう。"beautiful"は4音節だからmore beautiful！🎵'
  },
  {
    id:6, title:'否定', subtitle:'Negation in English',
    icon:`<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="22" stroke="#FF6B6B" stroke-width="2"/><line x1="16" y1="16" x2="48" y2="48" stroke="#FF6B6B" stroke-width="2"/><text x="32" y="36" text-anchor="middle" font-size="11" fill="#FF6B6B">NOT</text></svg>`,
    intro:`英語の「〜しない」はnotひとつで作れる。シンプルだけど位置が大事！🚫<br>日本語の否定は文末に来るけど、英語は助動詞やbe動詞のすぐ後。この違いをしっかり覚えよう！`,
    rules:[
      {color:'cyan',title:'🚫 基本の否定',content:`
        <div class="diagram"><span class="box-s">S</span><span class="arrow">+</span><span class="box-v">be動詞</span><span class="arrow">+</span><span class="box-n">not</span><span class="arrow">+</span><span class="box-c">形容詞/名詞</span></div>
        <p>She is <b>not</b> happy. / They are <b>not</b> students.</p>
        <div class="diagram"><span class="box-s">S</span><span class="arrow">+</span><span class="box-n">don't/doesn't</span><span class="arrow">+</span><span class="box-v">動詞原形</span></div>
        <p>I <b>don't</b> know. / She <b>doesn't</b> like coffee.</p>`},
      {color:'gold',title:'🔒 強い否定表現',content:`
        <p><b>never</b>（決して〜ない）: I <b>never</b> eat meat.</p>
        <p><b>no + 名詞</b>: I have <b>no idea</b>. / There is <b>no time</b>.</p>
        <p><b>nobody / nothing / nowhere</b>: <b>Nobody</b> knows. / I said <b>nothing</b>.</p>`},
      {color:'coral',title:'⚠️ 二重否定に注意',content:`
        <p>英語では二重否定は使わない！（ロジックが複雑になる）</p>
        <p>✗: I <b>don't</b> know <b>nothing</b>.（文法的に誤り）</p>
        <p>✓: I don't know <b>anything</b>. / I know <b>nothing</b>.</p>`},
    ],
    examples:[
      {en:"I don't think that's a good idea.",ja:'それはいいアイデアではないと思う。',em:'🤔'},
      {en:'She has never been to Europe.',ja:'彼女はヨーロッパに行ったことがない。',em:'✈️'},
      {en:"There's no place like home.",ja:'ホームほど良い場所はない。',em:'🏠'},
      {en:'I said nothing about the plan.',ja:'私は計画について何も言わなかった。',em:'🤐'},
      {en:"He isn't interested in sports at all.",ja:'彼はスポーツに全く興味がない。',em:'⚽'},
    ],
    mistakes:[
      {wrong:"I don't know nothing about it.",right:"I don't know anything about it. 　→ 二重否定はNG"},
      {wrong:'She no likes fish.',right:"She doesn't like fish. 　→ 一般動詞の否定は don't/doesn't"},
      {wrong:'Never I eat fast food.',right:'I never eat fast food. 　→ 主語を先に、never は動詞の前'},
    ],
    tip:'notは「助動詞・be動詞の直後」に来る！be not / do not / can not... 助動詞系はすべて同じパターン。まず助動詞を見つけてその直後にnotを置けばOK！🎯'
  },
  {
    id:7, title:'助動詞', subtitle:'Modal Verbs',
    icon:`<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="18" width="48" height="28" rx="6" fill="rgba(255,230,109,0.1)" stroke="#FFE66D" stroke-width="1.5"/><text x="32" y="28" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFE66D">can / will / must</text><text x="32" y="40" text-anchor="middle" font-family="monospace" font-size="8" fill="#4ECDC4">may / should / could</text><path d="M28 48 L32 56 L36 48" fill="#FFE66D"/></svg>`,
    intro:`can, will, must... たった1語で意味がガラリと変わる魔法の言葉！✨<br>助動詞は動詞の前に置くだけで「できる」「するだろう」「しなければならない」などのニュアンスを加えられる。種類と意味を整理しよう！`,
    rules:[
      {color:'cyan',title:'🔵 can / could',content:`
        <p><b>can</b>: 能力（〜できる）/ 許可（〜していいよ）</p>
        <p>I <b>can</b> swim. / <b>Can</b> I open the window?</p>
        <p><b>could</b>: can の過去形 / 丁寧な依頼</p>
        <p><b>Could</b> you help me? （could の方が丁寧）</p>`},
      {color:'gold',title:'🟡 will / would',content:`
        <p><b>will</b>: 未来の予測・意志（〜するだろう・〜するつもり）</p>
        <p>It <b>will</b> rain tomorrow. / I <b>will</b> help you.</p>
        <p><b>would</b>: will の過去形 / 丁寧な表現 / 仮定</p>
        <p><b>Would</b> you like some tea? （丁寧なオファー）</p>`},
      {color:'coral',title:'🔴 must / have to / should',content:`
        <p><b>must</b>: 義務（しなければならない）/ 強い推量（〜に違いない）</p>
        <p>You <b>must</b> wear a seatbelt. / She <b>must</b> be tired.</p>
        <p><b>have to</b>: 外部からの義務（〜しなければならない）</p>
        <p><b>should</b>: アドバイス・義務（〜すべき）</p>
        <p>You <b>should</b> see a doctor. / You <b>should have</b> called. （〜すべきだったのに）</p>`},
      {color:'green',title:'🟢 may / might',content:`
        <p><b>may</b>: 許可（〜してもよい）/ 推量（〜かもしれない 50%）</p>
        <p><b>might</b>: やや弱い推量（〜かもしれない 30%）</p>
        <p>It <b>may</b> rain. / She <b>might</b> be late.</p>`},
    ],
    examples:[
      {en:'You must submit the report by Friday.',ja:'金曜日までにレポートを提出しなければならない。',em:'📋'},
      {en:'Could you speak more slowly, please?',ja:'もう少しゆっくり話していただけますか？',em:'🙏'},
      {en:'She might be at home right now.',ja:'彼女は今、家にいるかもしれない。',em:'🏠'},
      {en:'You should apologize to him.',ja:'あなたは彼に謝るべきだ。',em:'😔'},
      {en:'May I use your phone?',ja:'電話を使ってもいいですか？',em:'📱'},
    ],
    mistakes:[
      {wrong:'She must to go now.',right:'She must go now. 　→ 助動詞の後に to はつけない！'},
      {wrong:'He cans speak French.',right:'He can speak French. 　→ 助動詞に s はつけない'},
      {wrong:'You should to study more.',right:'You should study more. 　→ should の後も to 不要'},
    ],
    tip:'助動詞の後は必ず動詞の原形！s / ed / ing はつけない。これは絶対ルール。"He musts" "She cans" "They shoulds" → すべて間違い！🚫'
  },
  {
    id:8, title:'前置詞', subtitle:'Prepositions: in / on / at & more',
    icon:`<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="10" y="18" width="20" height="20" rx="3" fill="rgba(78,205,196,0.15)" stroke="#4ECDC4" stroke-width="1.5"/><circle cx="50" cy="32" r="4" fill="#FF6B6B"/><line x1="8" y1="40" x2="60" y2="40" stroke="#FFE66D" stroke-width="1.5"/><text x="20" y="32" text-anchor="middle" font-size="9" fill="#4ECDC4">in</text><text x="38" y="44" text-anchor="middle" font-size="9" fill="#A8E063">on</text><text x="50" y="28" text-anchor="middle" font-size="9" fill="#FF6B6B">at</text></svg>`,
    intro:`in, on, at... これが苦手な人多いですよね！😅 でもイメージで覚えれば驚くほど簡単になる。<br>場所も時間も同じルールで使えるから、一度コツをつかめば一石二鳥！`,
    rules:[
      {color:'cyan',title:'📍 場所の前置詞',content:`
        <div class="diagram"><span class="box-s">in</span><span class="arrow">=</span><span class="box-n">広い空間・囲まれた中</span></div>
        <p>in Tokyo / in the box / in the room / in Japan</p>
        <div class="diagram"><span class="box-v">on</span><span class="arrow">=</span><span class="box-n">面・接触している</span></div>
        <p>on the table / on the wall / on the floor / on the bus</p>
        <div class="diagram"><span class="box-o">at</span><span class="arrow">=</span><span class="box-n">ピンポイント・1点</span></div>
        <p>at the door / at the bus stop / at home / at school</p>`},
      {color:'gold',title:'⏰ 時間の前置詞',content:`
        <div class="diagram"><span class="box-s">in</span><span class="arrow">=</span><span class="box-n">長い期間</span></div>
        <p>in the morning / in January / in 2024 / in spring</p>

        <div class="diagram"><span class="box-o">at</span><span class="arrow">=</span><span class="box-n">ピンポイントの時刻</span></div>
        <p>at 3 o'clock / at noon / at midnight / at night</p>`},
      {color:'coral',title:'🧭 方向・その他',content:`
        <p><b>to</b>: 方向（〜へ）→ go to school</p>
        <p><b>from</b>: 起点（〜から）→ from Tokyo</p>
        <p><b>by</b>: 手段（〜で）→ by train / by car</p>
        <p><b>for</b>: 目的・期間 → for you / for 3 years</p>
        <p><b>with</b>: 同伴・道具 → with friends / cut with a knife</p>`},
    ],
    examples:[
      {en:"I'll meet you at the coffee shop at 3 p.m.",ja:'午後3時にコーヒーショップで会いましょう。',em:'☕'},
      {en:'She was born in Osaka in April.',ja:'彼女は4月に大阪で生まれた。',em:'🌸'},
      {en:'The meeting is on Monday morning.',ja:'会議は月曜日の朝です。',em:'📅'},
      {en:'He traveled to Paris by train.',ja:'彼は電車でパリへ旅した。',em:'🚂'},
      {en:"There's a beautiful painting on the wall.",ja:'壁に美しい絵がかかっている。',em:'🖼️'},
    ],
    mistakes:[
      {wrong:'I go to school in Monday.',right:'I go to school on Monday. 　→ 曜日には on'},
      {wrong:'She woke up at the morning.',right:'She woke up in the morning. 　→ 朝・午後・夜は in'},
      {wrong:'He arrived to the airport.',right:'He arrived at the airport. 　→ arrive の後は at/in（to は不要）'},
    ],
    tip:'場所も時間も同じルール！in=広い空間・長い期間、on=面・特定の日、at=ピンポイント。これだけ覚えればほとんどの前置詞がOK！🗺️'
  },
  {
    id:9, title:'WH修飾（関係詞）', subtitle:'Relative Clauses',
    icon:`<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="20" width="24" height="12" rx="3" fill="rgba(78,205,196,0.15)" stroke="#4ECDC4" stroke-width="1"/><rect x="4" y="36" width="24" height="12" rx="3" fill="rgba(255,107,107,0.15)" stroke="#FF6B6B" stroke-width="1"/><path d="M28 26 Q40 26 40 32 Q40 38 28 38" stroke="#FFE66D" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/><rect x="40" y="24" width="20" height="16" rx="3" fill="rgba(255,230,109,0.15)" stroke="#FFE66D" stroke-width="1"/><text x="16" y="29" text-anchor="middle" font-size="7" fill="#4ECDC4">sentence1</text><text x="16" y="45" text-anchor="middle" font-size="7" fill="#FF6B6B">sentence2</text><text x="50" y="35" text-anchor="middle" font-size="7" fill="#FFE66D">ONE!</text></svg>`,
    intro:`2つの文を1つにまとめる便利な道具が関係詞！🔗 英語らしい表現ができるようになる。<br>日本語の「〜な（名詞）」に対応している。「東京に住んでいる友達」→「a friend who lives in Tokyo」という変換ができれば自然な英語に！`,
    rules:[
      {color:'cyan',title:'👤 who / which / that の使い分け',content:`
        <div class="diagram"><span class="box-s">who</span><span class="arrow">→</span><span class="box-n">人について</span></div>
        <p>the man <b>who</b> lives next door</p>
        <div class="diagram"><span class="box-v">which</span><span class="arrow">→</span><span class="box-n">物・動物について</span></div>
        <p>the book <b>which</b> I bought yesterday</p>
        <div class="diagram"><span class="box-o">that</span><span class="arrow">→</span><span class="box-n">人・物どちらもOK</span></div>
        <p>the person / the book <b>that</b> I like</p>`},
      {color:'gold',title:'📌 関係詞の省略',content:`
        <p>関係詞が節の中で目的語の役割の場合、省略できる：</p>
        <p>the book <b>(that/which)</b> I read → the book I read ✓</p>
        <p>⚠️ 主語の場合は省略不可：</p>
        <p>the man <del>who</del> lives here → ✗ （who は省略できない）</p>`},
      {color:'coral',title:'📍 where / when',content:`
        <p><b>where</b>: 場所について</p>
        <p>the city <b>where</b> I was born</p>
        <p><b>when</b>: 時間について</p>
        <p>the day <b>when</b> we first met</p>`},
    ],
    examples:[
      {en:'I have a friend who speaks five languages.',ja:'5つの言語を話す友達がいる。',em:'🌍'},
      {en:'The movie that we watched last night was amazing.',ja:'昨夜見た映画は素晴らしかった。',em:'🎬'},
      {en:'This is the restaurant where we had our first date.',ja:'これが初めてデートしたレストランだ。',em:'🍽️'},
      {en:'She is the person I respect most.',ja:'彼女は私が最も尊敬する人だ。（thatを省略）',em:'⭐'},
      {en:"Do you know the reason why he left?",ja:'彼がなぜ去ったのか理由を知っていますか？',em:'❓'},
    ],
    mistakes:[
      {wrong:'I have a friend which speaks French.',right:'I have a friend who speaks French. 　→ 人には who'},
      {wrong:'The book who I read was good.',right:'The book which/that I read was good. 　→ 物には which/that'},
      {wrong:'She is the woman which I love.',right:'She is the woman (that/who) I love. 　→ 人には who か that'},
    ],
    tip:'日本語の「〜な（名詞）」に対応！「東京に住んでいる友達」→ "a friend who lives in Tokyo"。日本語の「〜な」の前の部分が関係詞節になると考えよう！💡'
  },
  {
    id:10, title:'動詞ing系', subtitle:'Gerunds & Present Participles',
    icon:`<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="20" stroke="#A8E063" stroke-width="1.5" fill="rgba(168,224,99,0.08)"/><path d="M22 32 Q32 20 42 32 Q32 44 22 32" fill="rgba(168,224,99,0.15)" stroke="#A8E063" stroke-width="1.5"/><text x="32" y="36" text-anchor="middle" font-family="monospace" font-size="9" fill="#A8E063">-ing</text></svg>`,
    intro:`-ingをつけるだけで2種類の使い方ができる！🔄 動名詞として主語や目的語になったり、現在分詞として進行形や名詞修飾に使ったり。<br>特に「〜ing を目的語にとる動詞」は丸ごと覚えるのが近道！`,
    rules:[
      {color:'cyan',title:'📝 動名詞（Gerund）',content:`
        <p>動詞を名詞化 → 主語・目的語・前置詞の目的語に使える</p>
        <p><b>主語</b>: <b>Swimming</b> is great exercise.</p>
        <p><b>目的語</b>: I enjoy <b>reading</b>.</p>
        <p><b>前置詞の後</b>: She is good at <b>cooking</b>. / Thank you for <b>coming</b>.</p>`},
      {color:'gold',title:'📋 -ing を目的語にとる動詞',content:`
        <p>以下の動詞の後は必ず -ing 形！</p>
        <p style="margin-top:6px"><b>enjoy / finish / avoid / mind / keep / stop / give up / practice / consider / suggest</b></p>
        <p style="margin-top:8px">I <b>enjoy swimming</b>. / She <b>finished writing</b> the report.</p>
        <p>He <b>stopped smoking</b>. / <b>Keep trying</b>!</p>`},
      {color:'coral',title:'🔄 現在分詞',content:`
        <p><b>進行形</b>: She is <b>running</b>. / They were <b>talking</b>.</p>
        <p><b>名詞修飾（前置）</b>: a <b>running</b> man（走っている男）</p>
        <p><b>名詞修飾（後置）</b>: the man <b>running in the park</b>（公園で走っている男）</p>`},
    ],
    examples:[
      {en:'I enjoy walking in the rain.',ja:'雨の中を歩くのが好きだ。',em:'☔'},
      {en:'She gave up trying to convince him.',ja:'彼を説得しようとするのをあきらめた。',em:'😮‍💨'},
      {en:'Eating breakfast is important for health.',ja:'朝食を食べることは健康に大切だ。',em:'🥞'},
      {en:'The sleeping baby looked peaceful.',ja:'眠っている赤ちゃんは穏やかに見えた。',em:'👶'},
      {en:'Would you mind closing the window?',ja:'窓を閉めていただけますか？',em:'🪟'},
    ],
    mistakes:[
      {wrong:'I enjoy to swim.',right:'I enjoy swimming. 　→ enjoy の後は -ing'},
      {wrong:'She finished to write the report.',right:'She finished writing the report. 　→ finish の後も -ing'},
      {wrong:'He stopped to smoke.',right:'He stopped smoking. 　→ stop smoking = タバコをやめた（stop to smoke = タバコを吸うために立ち止まった）'},
    ],
    tip:'enjoy/finish/avoid の後は必ず -ing 形！「すでに起きていること」や「事実」を目的語にするイメージ。過去・現在の現実感 → -ing、未来・意図 → to不定詞と覚えよう！🎯'
  },
  {
    id:11, title:'To不定詞', subtitle:'Infinitives: 3 Ways to Use',
    icon:`<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><text x="10" y="38" font-family="monospace" font-size="18" fill="#4ECDC4" font-weight="bold">to</text><path d="M36 20 L36 44" stroke="#FFE66D" stroke-width="2" stroke-linecap="round"/><path d="M28 28 L44 20" stroke="#FFE66D" stroke-width="2" stroke-linecap="round"/><path d="M28 36 L44 44" stroke="#FFE66D" stroke-width="2" stroke-linecap="round"/></svg>`,
    intro:`to＋動詞の原形で3種類の使い方！📐 英語の文法の中でもかなり重要なトピック。<br>名詞的用法・形容詞的用法・副詞的用法の3パターンを整理しよう。使える場面がぐっと広がります！`,
    rules:[
      {color:'cyan',title:'📝 名詞的用法（〜すること）',content:`
        <p><b>主語として</b>: <b>To learn English</b> is fun. （= It is fun to learn English.）</p>
        <p><b>目的語として</b>: I want <b>to travel</b> the world.</p>
        <p style="margin-top:8px"><b>to不定詞を目的語にとる動詞</b>:</p>
        <p>want / hope / decide / plan / promise / need / try / expect / refuse / agree</p>`},
      {color:'gold',title:'🏷️ 形容詞的用法（〜するための、〜すべき）',content:`
        <p>名詞の後に置いて説明する：</p>
        <p>I have something <b>to tell</b> you. （あなたに話すべきことがある）</p>
        <p>She needs a place <b>to stay</b>. （泊まる場所）</p>
        <p>He has no time <b>to waste</b>. （無駄にする時間がない）</p>`},
      {color:'coral',title:'🎯 副詞的用法（〜するために、〜して）',content:`
        <p><b>目的</b>: She studies hard <b>to pass</b> the exam. （試験に合格するために）</p>
        <p><b>感情の原因</b>: I'm glad <b>to meet</b> you. （会えて嬉しい）</p>
        <p><b>結果</b>: He grew up <b>to be</b> a doctor. （成長して医者になった）</p>`},
      {color:'green',title:'🌟 It is ... to ~ 構文',content:`
        <p><b>It is + 形容詞 + to不定詞</b></p>
        <p>It is <b>important to exercise</b> every day.</p>
        <p>It is <b>difficult to learn</b> Chinese.</p>
        <p>It is <b>kind of you to help</b> me. （of you = あなたは親切だ）</p>`},
    ],
    examples:[
      {en:'I decided to move to a new city.',ja:'新しい都市に引っ越すことにした。',em:'🏙️'},
      {en:'She has a dream to become a doctor.',ja:'彼女は医者になるという夢を持っている。',em:'👩‍⚕️'},
      {en:'He went to the library to study.',ja:'勉強するために図書館へ行った。',em:'📚'},
      {en:'It is essential to drink enough water.',ja:'十分な水を飲むことは不可欠だ。',em:'💧'},
      {en:'I was surprised to hear the news.',ja:'そのニュースを聞いて驚いた。',em:'😮'},
    ],
    mistakes:[
      {wrong:'I want going to Paris.',right:'I want to go to Paris. 　→ want の後は to不定詞'},
      {wrong:'She hopes visiting Japan.',right:'She hopes to visit Japan. 　→ hope の後も to不定詞'},
      {wrong:'He decided studying abroad.',right:'He decided to study abroad. 　→ decide の後は to不定詞'},
    ],
    tip:'want/hope/decide の後はto不定詞！未来や意図を表す動詞はto不定詞とセットになりやすい。「これからすること・したいこと」→ to不定詞、「もうやっていること・過去の事実」→ -ing形！🔮'
  },
  {
    id:12, title:'過去分詞系', subtitle:'Passive, Perfect & Participial Adjectives',
    icon:`<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="24" width="52" height="16" rx="4" fill="rgba(255,107,107,0.1)" stroke="#FF6B6B" stroke-width="1.5"/><text x="32" y="35" text-anchor="middle" font-family="monospace" font-size="9" fill="#FF6B6B">have/has + pp</text><path d="M10 24 L10 12 L32 12" stroke="#4ECDC4" stroke-width="1.5" stroke-dasharray="3,2"/><circle cx="32" cy="12" r="3" fill="#4ECDC4"/><path d="M54 24 L54 48 L32 48" stroke="#FFE66D" stroke-width="1.5" stroke-dasharray="3,2"/><circle cx="32" cy="48" r="3" fill="#FFE66D"/></svg>`,
    intro:`過去分詞を使いこなせると英語の表現力が格段にアップ！🚀 3パターン覚えよう。<br>受動態・現在完了・形容詞的用法、どれも日常会話やライティングで頻出。特に現在完了は日本人が混乱しやすいポイント！`,
    rules:[
      {color:'cyan',title:'🔄 受動態（be + pp）',content:`
        <div class="diagram"><span class="box-s">S</span><span class="arrow">+</span><span class="box-v">be動詞</span><span class="arrow">+</span><span class="box-o">過去分詞</span><span class="arrow">+</span><span class="box-n">by ...</span></div>
        <p>The letter <b>was written</b> by her.</p>
        <p>English <b>is spoken</b> all over the world.</p>
        <p>The bridge <b>is being repaired</b>. （現在進行形の受動態）</p>`},
      {color:'gold',title:'⏱️ 現在完了（have/has + pp）',content:`
        <p><b>経験</b>（〜したことがある）: I have <b>visited</b> Paris twice.</p>
        <p><b>完了</b>（〜し終えた）: She has just <b>finished</b> her homework.</p>
        <p><b>継続</b>（ずっと〜している）: He has <b>lived</b> here for 10 years.</p>
        <div class="diagram"><span class="box-n">for + 期間</span><span class="arrow">vs</span><span class="box-n">since + 起点</span></div>
        <p>for 3 years（3年間）/ since 2020（2020年から）</p>`},
      {color:'coral',title:'🕐 過去完了（had + pp）',content:`
        <p>過去のある時点より前に完了していた出来事：</p>
        <p>When I arrived, she <b>had already left</b>.</p>
        <p>He <b>had never eaten</b> sushi before he visited Japan.</p>`},
    ],
    examples:[
      {en:'I have been to New York three times.',ja:'ニューヨークに3回行ったことがある。',em:'🗽'},
      {en:'This building was constructed in 1890.',ja:'この建物は1890年に建設された。',em:'🏛️'},
      {en:'She has worked here since 2018.',ja:'彼女は2018年からここで働いている。',em:'💼'},
      {en:'By the time he arrived, they had already eaten.',ja:'彼が到着した時、彼らはすでに食べていた。',em:'🍽️'},
      {en:'I am interested in learning new things.',ja:'私は新しいことを学ぶことに興味がある。（interested=形容詞的用法）',em:'🌱'},
    ],
    mistakes:[
      {wrong:'I have seen him yesterday.',right:'I saw him yesterday. 　→ yesterday（特定の過去）と現在完了は一緒に使えない'},
      {wrong:'She has lived here since three years.',right:'She has lived here for three years. 　→ 期間の長さには for'},
      {wrong:'I have been to Paris last year.',right:'I went to Paris last year. 　→ last year は特定の過去、過去形を使う'},
    ],
    tip:'yesterday/last week/ago → 必ず過去形！現在完了との組み合わせは不可。「過去の特定の時点」がわかる言葉が文にあったら現在完了は使えない！⏰'
  },
  {
    id:13, title:'節', subtitle:'Noun, Adjective & Adverb Clauses',
    icon:`<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="8" width="52" height="12" rx="3" fill="rgba(78,205,196,0.15)" stroke="#4ECDC4" stroke-width="1.5"/><text x="32" y="17" text-anchor="middle" font-size="8" fill="#4ECDC4">Main Clause</text><rect x="14" y="28" width="36" height="12" rx="3" fill="rgba(255,230,109,0.15)" stroke="#FFE66D" stroke-width="1"/><text x="32" y="37" text-anchor="middle" font-size="8" fill="#FFE66D">that / if / whether</text><rect x="14" y="46" width="36" height="12" rx="3" fill="rgba(168,224,99,0.1)" stroke="#A8E063" stroke-width="1"/><text x="32" y="55" text-anchor="middle" font-size="8" fill="#A8E063">when / because / if</text><line x1="32" y1="20" x2="32" y2="28" stroke="#4ECDC4" stroke-width="1" stroke-dasharray="2,2"/></svg>`,
    intro:`文の中に文を入れる！これが「節」。🧩 複雑な表現もこれで作れるようになる。<br>名詞節・形容詞節・副詞節の3種類があって、それぞれ使い方が違う。難しそうに見えるけど、パターンを覚えれば大丈夫！`,
    rules:[
      {color:'cyan',title:'📝 名詞節（that / if / whether / WH）',content:`
        <p>文全体が名詞の役割をする：</p>
        <p><b>that節</b>: I think <b>that he is right</b>.</p>
        <p><b>if/whether節</b>: I don't know <b>if she will come</b>. （彼女が来るかどうか）</p>
        <p><b>WH節</b>: Tell me <b>what you want</b>. / I wonder <b>where she went</b>.</p>`},
      {color:'gold',title:'🏷️ 形容詞節（関係詞節）',content:`
        <p>名詞を後ろから修飾する（Unit 9 の関係詞）：</p>
        <p>The girl <b>who lives next door</b> is a musician.</p>
        <p>The book <b>that I bought</b> was interesting.</p>`},
      {color:'coral',title:'🎯 副詞節（時・条件・理由・譲歩）',content:`
        <p><b>時</b>: <b>When</b> she arrived, everyone cheered.</p>
        <p><b>条件</b>: <b>If</b> it rains, we'll stay home.</p>
        <p><b>理由</b>: <b>Because</b> he was tired, he went to bed.</p>
        <p><b>譲歩</b>: <b>Although</b> it was raining, they played outside.</p>
        <p style="margin-top:8px">⚠️ <b>重要</b>: 時・条件の副詞節では、未来のことでも現在形を使う！</p>
        <p><b>If it rains</b> tomorrow, ... （× will rain）</p>`},
    ],
    examples:[
      {en:'I believe that practice makes perfect.',ja:'練習が完璧を作ると信じている。',em:'💪'},
      {en:'She asked if I had eaten dinner.',ja:'彼女は私が夕食を食べたかどうか聞いた。',em:'🍜'},
      {en:'Although he studied hard, he failed the exam.',ja:'一生懸命勉強したが、試験に落ちた。',em:'📝'},
      {en:"When I get home, I'll call you.",ja:'家に着いたら電話するよ。（条件節→現在形）',em:'📱'},
      {en:"Tell me what you're thinking.",ja:'何を考えているのか教えて。',em:'💭'},
    ],
    mistakes:[
      {wrong:'I wonder where does she live.',right:'I wonder where she lives. 　→ 間接疑問文は「疑問詞+主語+動詞」の語順'},
      {wrong:'If it will rain tomorrow, I stay home.',right:"If it rains tomorrow, I'll stay home. 　→ 条件節は現在形"},
      {wrong:'She asked me that if I was OK.',right:'She asked me if I was OK. 　→ if節に that は不要'},
    ],
    tip:'間接疑問文は「疑問詞＋主語＋動詞」の語順。Do/Does/Did は使わない！"Where does she live?" → "I know where she lives." 疑問文の語順から変わることに注意！🔄'
  },
  {
    id:14, title:'疑問文', subtitle:'Questions: All Types',
    icon:`<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><text x="32" y="42" text-anchor="middle" font-size="36" fill="rgba(255,230,109,0.8)">?</text><circle cx="32" cy="12" r="6" fill="rgba(78,205,196,0.2)" stroke="#4ECDC4" stroke-width="1.5"/><circle cx="12" cy="32" r="4" fill="rgba(255,107,107,0.2)" stroke="#FF6B6B" stroke-width="1"/><circle cx="52" cy="32" r="4" fill="rgba(168,224,99,0.2)" stroke="#A8E063" stroke-width="1"/></svg>`,
    intro:`疑問文は語順を変えるだけ！パターンを覚えれば怖くない。😊<br>Yes/No疑問文、WH疑問文、付加疑問文...種類が多く見えるけど、基本ルールは「助動詞・be動詞を前に出す」これだけ！`,
    rules:[
      {color:'cyan',title:'✅ Yes/No疑問文',content:`
        <div class="diagram"><span class="box-v">be動詞/助動詞</span><span class="arrow">+</span><span class="box-s">S</span><span class="arrow">+</span><span class="box-o">...?</span></div>
        <p><b>Is</b> she a teacher? / <b>Can</b> you swim?</p>
        <p><b>Do/Does/Did</b> + S + 動詞原形...?</p>
        <p><b>Do</b> you like coffee? / <b>Does</b> she know him?</p>`},
      {color:'gold',title:'❓ WH疑問文',content:`
        <div class="diagram"><span class="box-n">WH語</span><span class="arrow">+</span><span class="box-v">助動詞</span><span class="arrow">+</span><span class="box-s">S</span><span class="arrow">+</span><span class="box-o">...?</span></div>
        <p><b>Where</b> do you live? / <b>What</b> does she do?</p>
        <p><b>WH語が主語の場合は語順変化なし</b>：</p>
        <p><b>Who</b> knows the answer? （who が主語 → do/does 不要）</p>
        <p><b>What</b> happened? （what が主語）</p>`},
      {color:'coral',title:'🔁 付加疑問文',content:`
        <p>文末に「〜ですよね？」を付ける：</p>
        <p><b>肯定文 → 否定の付加疑問</b>: She is kind, <b>isn't she</b>?</p>
        <p><b>否定文 → 肯定の付加疑問</b>: He doesn't like it, <b>does he</b>?</p>
        <p>⚠️ be動詞・助動詞をそのまま使う！</p>
        <p>You can drive, <b>can't you</b>? / They went, <b>didn't they</b>?</p>`},
    ],
    examples:[
      {en:'Where did you grow up?',ja:'どこで育ちましたか？',em:'🌱'},
      {en:'Who wrote this letter?',ja:'誰がこの手紙を書いたの？（who が主語）',em:'✉️'},
      {en:"It's a beautiful day, isn't it?",ja:'良い天気ですね。（付加疑問文）',em:'☀️'},
      {en:'What time does the meeting start?',ja:'会議は何時に始まりますか？',em:'⏰'},
      {en:'How long have you been studying English?',ja:'英語をどのくらい勉強していますか？',em:'📖'},
    ],
    mistakes:[

// ── NAVIGATION ──
function showUnit(id) {
  document.querySelectorAll('.unit-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.unit-item').forEach(i => i.classList.remove('active'));
  document.getElementById(`unit-${id}`).classList.add('active');
  document.querySelector(`.unit-item[data-id="${id}"]`).classList.add('active');
  visited.add(id);
  updateProgress();
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress() {
  const pct = Math.round((visited.size / UNITS.length) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  visited.forEach(id => {
    const item = document.querySelector(`.unit-item[data-id="${id}"]`);
    if(item && !item.querySelector('.unit-done')) {
      const done = document.createElement('span');
      done.className = 'unit-done';
      done.textContent = '✓';
      item.appendChild(done);
    }
  });
}

function toggleAnswer(el) {
  const ans = el.querySelector('.quiz-answer');
  ans.classList.toggle('revealed');
  const hint = el.querySelector('.q-hint');
  hint.textContent = ans.classList.contains('revealed') ? '▲ 閉じる' : 'クリックして答えを表示';
}

// Start
showUnit(1);
</script>
</body>
</html>
