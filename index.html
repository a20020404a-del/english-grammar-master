<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAMMAR//OS — 英文法システム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --c: #00E5FF;
  --m: #FF0066;
  --g: #FFD700;
  --bg: #03080F;
  --bg2: #060D1A;
  --panel: rgba(6,16,32,0.92);
  --border: rgba(0,229,255,0.18);
  --border2: rgba(0,229,255,0.08);
  --text: #C8E6F5;
  --muted: #4A7A99;
  --font-head: 'Orbitron', sans-serif;
  --font-body: 'Noto Sans JP', sans-serif;
  --font-mono: 'Space Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--c);border-radius:2px;opacity:.5}

/* ── BASE ── */
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── CANVAS BG ── */
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:.35}

/* ── SCANLINES ── */
body::after{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px);
  pointer-events:none;z-index:1;
}

/* ── LAYOUT ── */
#app{position:relative;z-index:2;display:flex;min-height:100vh}

/* ── SIDEBAR ── */
#sidebar{
  width:280px;min-width:280px;
  background:linear-gradient(180deg,rgba(0,10,25,.98) 0%,rgba(3,10,22,.98) 100%);
  border-right:1px solid var(--border);
  height:100vh;position:sticky;top:0;
  overflow-y:auto;display:flex;flex-direction:column;
  box-shadow:4px 0 30px rgba(0,229,255,.05);
}
.sidebar-head{
  padding:1.8rem 1.4rem 1.2rem;
  border-bottom:1px solid var(--border2);
}
.sidebar-logo{
  font-family:var(--font-head);
  font-size:.65rem;
  letter-spacing:.25em;
  color:var(--c);
  opacity:.7;
  margin-bottom:.5rem;
}
.sidebar-title{
  font-family:var(--font-head);
  font-size:1rem;
  font-weight:900;
  letter-spacing:.06em;
  line-height:1.3;
  background:linear-gradient(135deg,var(--c),#80F0FF);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.sidebar-sub{font-size:.72rem;color:var(--muted);margin-top:.3rem;letter-spacing:.03em}

/* progress */
.prog-wrap{padding:.9rem 1.4rem;border-bottom:1px solid var(--border2)}
.prog-label{font-family:var(--font-mono);font-size:.65rem;color:var(--muted);letter-spacing:.1em;margin-bottom:.4rem;display:flex;justify-content:space-between}
.prog-track{height:3px;background:rgba(0,229,255,.12);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--c),#0099FF);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px var(--c)}

/* nav items */
#nav-list{flex:1;padding:.5rem 0}
.nav-item{
  display:flex;align-items:center;gap:.75rem;
  padding:.55rem 1.4rem;cursor:pointer;
  transition:all .2s;position:relative;
  border-left:2px solid transparent;
}
.nav-item:hover{background:rgba(0,229,255,.04);border-left-color:rgba(0,229,255,.3)}
.nav-item.active{background:rgba(0,229,255,.07);border-left-color:var(--c)}
.nav-item.active::after{
  content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);
  width:4px;height:60%;background:var(--c);border-radius:2px;
  box-shadow:0 0 8px var(--c);
}
.nav-icon-wrap{
  width:32px;height:32px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.15);
  flex-shrink:0;transition:all .2s;
}
.nav-item.active .nav-icon-wrap{background:rgba(0,229,255,.12);border-color:rgba(0,229,255,.4);box-shadow:0 0 12px rgba(0,229,255,.2)}
.nav-item.done .nav-icon-wrap{background:rgba(0,229,255,.08);border-color:rgba(0,229,255,.3)}
.nav-icon-wrap svg{width:18px;height:18px}
.nav-text{font-size:.8rem;line-height:1.3;flex:1}
.nav-text-jp{display:block;color:var(--text);font-weight:500}
.nav-text-num{display:block;font-family:var(--font-mono);font-size:.6rem;color:var(--muted);letter-spacing:.1em}
.nav-done-mark{width:14px;height:14px;border-radius:50%;background:var(--c);box-shadow:0 0 6px var(--c);display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:opacity .3s}
.nav-item.done .nav-done-mark{opacity:1}
.nav-done-mark svg{width:8px;height:8px}

/* ── MAIN ── */
#main{flex:1;padding:2rem 2.5rem;min-width:0}

/* ── UNIT HEADER ── */
.unit-hdr{margin-bottom:2rem;display:flex;gap:1.5rem;align-items:flex-start}
.unit-icon-hero{
  width:80px;height:80px;flex-shrink:0;
  border-radius:16px;display:flex;align-items:center;justify-content:center;
  border:1px solid;position:relative;overflow:hidden;
}
.unit-icon-hero::before{
  content:'';position:absolute;inset:0;
  background:inherit;filter:blur(20px);opacity:.3;transform:scale(1.5);
}
.unit-icon-hero svg{width:48px;height:48px;position:relative;z-index:1}
.unit-hdr-text{flex:1}
.unit-tag{
  font-family:var(--font-mono);font-size:.65rem;letter-spacing:.2em;
  color:var(--c);opacity:.8;margin-bottom:.4rem;
}
.unit-hdr h2{
  font-family:var(--font-head);font-size:1.6rem;font-weight:700;
  letter-spacing:.04em;margin-bottom:.4rem;line-height:1.2;
}
.unit-sub{font-size:.82rem;color:var(--muted);font-weight:300;letter-spacing:.02em}
.unit-desc{
  font-size:.88rem;color:var(--text);opacity:.75;line-height:1.7;
  margin-top:.5rem;max-width:560px;
}

/* glowing divider */
.glow-line{
  height:1px;
  background:linear-gradient(90deg,var(--c) 0%,rgba(0,229,255,.1) 60%,transparent 100%);
  margin:1.5rem 0;box-shadow:0 0 6px rgba(0,229,255,.3);
}

/* ── CARDS ── */
.card{
  background:var(--panel);
  border:1px solid var(--border2);
  border-radius:12px;padding:1.4rem 1.6rem;
  margin-bottom:1.2rem;
  backdrop-filter:blur(12px);
  transition:border-color .25s,box-shadow .25s;
}
.card:hover{border-color:var(--border);box-shadow:0 0 20px rgba(0,229,255,.04)}
.card-title{
  font-family:var(--font-mono);font-size:.7rem;letter-spacing:.15em;
  color:var(--c);margin-bottom:1rem;display:flex;align-items:center;gap:.6rem;
}
.card-title::before{content:'//';opacity:.4}

/* points */
.point-item{
  padding:.7rem 0;border-bottom:1px solid rgba(0,229,255,.07);
  font-size:.87rem;line-height:1.7;
}
.point-item:last-child{border-bottom:none}
.point-label{
  font-family:var(--font-mono);font-size:.72rem;color:var(--c);
  letter-spacing:.05em;margin-bottom:.25rem;opacity:.9;
}
.point-body{color:rgba(200,230,245,.75)}
.point-body strong{color:var(--c);font-weight:600}

/* examples table */
.ex-table{width:100%;border-collapse:collapse;font-size:.86rem}
.ex-table thead tr{border-bottom:1px solid rgba(0,229,255,.15)}
.ex-table th{
  font-family:var(--font-mono);font-size:.62rem;letter-spacing:.12em;
  color:var(--muted);padding:.4rem .6rem .6rem;text-align:left;
}
.ex-table td{padding:.55rem .6rem;border-bottom:1px solid rgba(0,229,255,.05);vertical-align:top}
.ex-table tr:last-child td{border-bottom:none}
.ex-table tr:hover td{background:rgba(0,229,255,.02)}
.en-cell{font-weight:600;color:#D4EDFA;letter-spacing:.01em}
.ja-cell{color:var(--muted);font-size:.8rem;padding-top:.1rem}

/* formula */
.formula{
  background:rgba(0,229,255,.04);
  border-left:3px solid var(--c);
  border-radius:0 8px 8px 0;
  padding:.65rem 1rem;margin:.6rem 0;
  font-family:var(--font-mono);font-size:.82rem;color:var(--c);
  box-shadow:inset 3px 0 15px rgba(0,229,255,.05);
}

/* ── QUIZ ── */
.quiz-card{
  background:rgba(3,8,20,.9);
  border:1px solid rgba(255,0,102,.2);
  border-radius:12px;padding:1.4rem 1.6rem;
  margin-bottom:1.2rem;
}
.quiz-header{
  font-family:var(--font-mono);font-size:.7rem;letter-spacing:.15em;
  color:var(--m);margin-bottom:1.2rem;display:flex;align-items:center;gap:.6rem;
}
.quiz-header::before{content:'//';opacity:.4}
.q-item{
  background:rgba(255,0,102,.03);
  border:1px solid rgba(255,0,102,.1);
  border-radius:8px;padding:1rem 1.1rem;margin-bottom:.8rem;
  transition:border-color .2s;
}
.q-item:hover{border-color:rgba(255,0,102,.2)}
.q-num{
  font-family:var(--font-mono);font-size:.6rem;letter-spacing:.1em;
  color:var(--m);opacity:.8;margin-bottom:.4rem;
}
.q-text{font-size:.9rem;line-height:1.6;font-weight:500}
.q-jp{
  font-size:.82rem;color:var(--muted);margin:.3rem 0 .6rem;
  padding-left:.6rem;border-left:2px solid rgba(255,0,102,.3);
}
.reveal-btn{
  background:transparent;border:1px solid rgba(255,0,102,.4);
  color:rgba(255,0,102,.8);border-radius:5px;
  padding:.3rem .85rem;font-size:.75rem;
  font-family:var(--font-mono);letter-spacing:.08em;
  cursor:pointer;transition:all .2s;
}
.reveal-btn:hover{background:rgba(255,0,102,.1);border-color:var(--m);color:var(--m);box-shadow:0 0 12px rgba(255,0,102,.2)}
.answer{
  display:none;margin-top:.7rem;
  background:rgba(0,229,255,.04);
  border:1px solid rgba(0,229,255,.2);
  border-radius:6px;padding:.7rem .9rem;
}
.answer.shown{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.ans-en{
  font-family:var(--font-mono);font-size:.88rem;font-weight:700;
  color:var(--c);letter-spacing:.02em;
  text-shadow:0 0 20px rgba(0,229,255,.4);
}
.ans-note{font-size:.75rem;color:var(--muted);margin-top:.3rem;line-height:1.5}

/* ── BUTTONS ── */
.btn-row{display:flex;gap:.8rem;margin-top:1.4rem;flex-wrap:wrap}
.btn{
  padding:.55rem 1.3rem;border-radius:6px;
  border:none;cursor:pointer;
  font-family:var(--font-mono);font-size:.75rem;letter-spacing:.08em;
  transition:all .2s;font-weight:700;
}
.btn-outline{
  background:transparent;border:1px solid rgba(0,229,255,.4);color:var(--c);
}
.btn-outline:hover{background:rgba(0,229,255,.08);box-shadow:0 0 15px rgba(0,229,255,.15);border-color:var(--c)}
.btn-primary{
  background:linear-gradient(135deg,rgba(0,180,220,.9),rgba(0,100,200,.9));
  color:#fff;border:1px solid var(--c);
  box-shadow:0 0 15px rgba(0,229,255,.2);
}
.btn-primary:hover{box-shadow:0 0 25px rgba(0,229,255,.35);transform:translateY(-1px)}
.btn-done{
  background:linear-gradient(135deg,rgba(0,229,255,.15),rgba(0,150,220,.1));
  color:var(--c);border:1px solid rgba(0,229,255,.4);
}
.btn-done:hover{background:rgba(0,229,255,.2);box-shadow:0 0 20px rgba(0,229,255,.2)}

/* complete banner */
.complete-banner{
  text-align:center;padding:2rem;
  border:1px solid rgba(255,215,0,.3);border-radius:12px;
  background:rgba(255,215,0,.04);margin-top:1rem;
}
.complete-banner h3{
  font-family:var(--font-head);font-size:1.1rem;
  color:var(--g);letter-spacing:.1em;
  text-shadow:0 0 20px rgba(255,215,0,.4);
  margin-bottom:.4rem;
}
.complete-banner p{font-size:.82rem;color:var(--muted)}

/* ── MOBILE ── */
@media(max-width:768px){
  #sidebar{width:100%;min-width:0;height:auto;position:relative;border-right:none;border-bottom:1px solid var(--border)}
  #nav-list{display:flex;flex-wrap:wrap;gap:.3rem;padding:.8rem}
  .nav-item{border-left:none;border:1px solid var(--border2);border-radius:8px;padding:.4rem .6rem;width:auto}
  .nav-item.active{border-color:rgba(0,229,255,.4)}
  .nav-item.active::after{display:none}
  .nav-text-jp{font-size:.72rem}
  .nav-text-num{display:none}
  .nav-done-mark,.nav-icon-wrap{display:none}
  .sidebar-head,.prog-wrap{display:none}
  #app{flex-direction:column}
  #main{padding:1.2rem}
  .unit-hdr{flex-direction:column;gap:1rem}
  .unit-icon-hero{width:60px;height:60px}
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="app">
  <nav id="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-logo">SYSTEM // ACTIVE</div>
      <div class="sidebar-title">GRAMMAR<br>// OS</div>
      <div class="sidebar-sub">英文法 マスターシステム / 初〜中級</div>
    </div>
    <div class="prog-wrap">
      <div class="prog-label">
        <span>PROGRESS</span>
        <span id="prog-label-val">0 / 16</span>
      </div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div id="nav-list"></div>
  </nav>
  <main id="main"></main>
</div>

<script>
/* ── BACKGROUND CANVAS ── */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function initParticles(){
  particles = [];
  const count = Math.floor((W * H) / 18000);
  for(let i=0;i<count;i++){
    particles.push({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-.5)*.25, vy: (Math.random()-.5)*.25,
      r: Math.random()*.8+.2,
      a: Math.random()*.6+.1,
      c: Math.random()>.7 ? '#FF0066' : '#00E5FF'
    });
  }
}

function drawGrid(){
  ctx.strokeStyle = 'rgba(0,229,255,0.03)';
  ctx.lineWidth = 1;
  const step = 60;
  for(let x=0;x<W;x+=step){
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
  }
  for(let y=0;y<H;y+=step){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
}

function animFrame(){
  ctx.clearRect(0,0,W,H);
  drawGrid();
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0)p.x=W; if(p.x>W)p.x=0;
    if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle = p.c;
    ctx.globalAlpha = p.a;
    ctx.fill();
    ctx.globalAlpha = 1;
  });
  // draw connections
  particles.forEach((p,i)=>{
    particles.slice(i+1).forEach(q=>{
      const dx=p.x-q.x, dy=p.y-q.y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<100){
        ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);
        ctx.strokeStyle='rgba(0,229,255,'+(0.04*(1-d/100))+')';
        ctx.lineWidth=.5;ctx.stroke();
      }
    });
  });
  requestAnimationFrame(animFrame);
}
resize(); initParticles(); animFrame();
window.addEventListener('resize',()=>{resize();initParticles();});

/* ── SVG ICONS ── */
const icons = [
  // 1 SVO blocks
  `<svg viewBox="0 0 48 48" fill="none"><rect x="2" y="17" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><text x="8" y="27" text-anchor="middle" font-size="6" fill="currentColor" font-family="Space Mono">S</text><rect x="18" y="17" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><text x="24" y="27" text-anchor="middle" font-size="6" fill="currentColor" font-family="Space Mono">V</text><rect x="34" y="17" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><text x="40" y="27" text-anchor="middle" font-size="6" fill="currentColor" font-family="Space Mono">O</text><path d="M14.5 24h3M30.5 24h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M17 24l1-1.5M17 24l1 1.5M31 24l1-1.5M31 24l1 1.5" stroke="currentColor" stroke-width="1.2"/></svg>`,
  // 2 Noun - label tag
  `<svg viewBox="0 0 48 48" fill="none"><path d="M8 12h20l10 12-10 12H8z" stroke="currentColor" stroke-width="1.5"/><circle cx="15" cy="24" r="2.5" fill="currentColor" opacity=".6"/><line x1="20" y1="19" x2="32" y2="19" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2,2"/><line x1="20" y1="24" x2="34" y2="24" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2,2"/><line x1="20" y1="29" x2="30" y2="29" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2,2"/></svg>`,
  // 3 Adj - color strokes
  `<svg viewBox="0 0 48 48" fill="none"><rect x="6" y="10" width="36" height="8" rx="2" stroke="currentColor" stroke-width="1.5" opacity=".8"/><rect x="6" y="22" width="28" height="8" rx="2" stroke="currentColor" stroke-width="1.5" opacity=".6"/><rect x="6" y="34" width="20" height="8" rx="2" stroke="currentColor" stroke-width="1.5" opacity=".4"/><text x="24" y="16" text-anchor="middle" font-size="5.5" fill="currentColor" font-family="Space Mono" opacity=".9">BIG</text><text x="20" y="28" text-anchor="middle" font-size="5.5" fill="currentColor" font-family="Space Mono" opacity=".7">OLD</text><text x="16" y="40" text-anchor="middle" font-size="5.5" fill="currentColor" font-family="Space Mono" opacity=".5">RED</text></svg>`,
  // 4 Adv - arrow + speed
  `<svg viewBox="0 0 48 48" fill="none"><path d="M6 24h30M30 18l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="8" y1="16" x2="16" y2="16" stroke="currentColor" stroke-width="1" opacity=".4"/><line x1="6" y1="20" x2="14" y2="20" stroke="currentColor" stroke-width="1" opacity=".3"/><line x1="8" y1="28" x2="16" y2="28" stroke="currentColor" stroke-width="1" opacity=".4"/><line x1="6" y1="32" x2="14" y2="32" stroke="currentColor" stroke-width="1" opacity=".3"/></svg>`,
  // 5 Compare - bars
  `<svg viewBox="0 0 48 48" fill="none"><rect x="8" y="28" width="12" height="14" rx="1" stroke="currentColor" stroke-width="1.5" opacity=".6"/><rect x="28" y="14" width="12" height="28" rx="1" stroke="currentColor" stroke-width="1.5"/><line x1="4" y1="42" x2="44" y2="42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M22 21h4M22 21l1.5-2M22 21l1.5 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`,
  // 6 Negative - X circle
  `<svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="18" stroke="currentColor" stroke-width="1.5"/><path d="M14 14l20 20M34 14l-20 20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,
  // 7 Modal - key
  `<svg viewBox="0 0 48 48" fill="none"><circle cx="16" cy="24" r="10" stroke="currentColor" stroke-width="1.5"/><circle cx="16" cy="24" r="4" stroke="currentColor" stroke-width="1.5" opacity=".5"/><path d="M26 24h16M38 24v4M34 24v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,
  // 8 Prep - dot in container
  `<svg viewBox="0 0 48 48" fill="none"><rect x="6" y="6" width="36" height="36" rx="3" stroke="currentColor" stroke-width="1.5"/><circle cx="24" cy="24" r="4" fill="currentColor"/><line x1="24" y1="6" x2="24" y2="10" stroke="currentColor" stroke-width="1" opacity=".4"/><line x1="24" y1="38" x2="24" y2="42" stroke="currentColor" stroke-width="1" opacity=".4"/><line x1="6" y1="24" x2="10" y2="24" stroke="currentColor" stroke-width="1" opacity=".4"/><line x1="38" y1="24" x2="42" y2="24" stroke="currentColor" stroke-width="1" opacity=".4"/></svg>`,
  // 9 Relative - chain

let current = 0;
let done = new Set();

function getColor(i){ return unitColors[i] || '#00E5FF'; }

function buildNav(){
  const nav = document.getElementById('nav-list');
  nav.innerHTML = units.map((u,i)=>`
    <div class="nav-item${i===current?' active':''}${done.has(i)?' done':''}" onclick="showUnit(${i})">
      <div class="nav-icon-wrap" style="color:${getColor(i)}">${icons[i]}</div>
      <div class="nav-text">
        <span class="nav-text-jp">${u.title}</span>
        <span class="nav-text-num">UNIT ${String(i+1).padStart(2,'0')}</span>
      </div>
      <div class="nav-done-mark"><svg viewBox="0 0 8 8" fill="none"><path d="M1 4l2 2 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>`).join('');
}

function buildUnit(i){
  const u = units[i];
  const col = getColor(i);

    <div class="unit-icon-hero" style="border-color:${col}40;background:${col}0A;color:${col}">
      ${icons[i]}

    <div class="unit-hdr-text">
      <div class="unit-tag">UNIT ${String(i+1).padStart(2,'0')} / 16 &nbsp;—&nbsp; ${u.subtitle}</div>
      <h2 style="color:${col};text-shadow:0 0 30px ${col}40">${u.title}</h2>
      <div class="unit-desc">${u.desc}</div>
    </div>
  </div>
  <div class="glow-line" style="background:linear-gradient(90deg,${col} 0%,${col}22 60%,transparent 100%);box-shadow:0 0 8px ${col}50"></div>

  <div class="card">
    <div class="card-title" style="color:${col}">KEY POINTS — 重要ポイント</div>
    ${u.points.map(p=>`
    <div class="point-item">
      <div class="point-label" style="color:${col}">${p.l}</div>
      <div class="point-body">${p.b}</div>
    </div>`).join('')}
  </div>

  <div class="card">
    <div class="card-title" style="color:${col}">EXAMPLES — 例文</div>
    <table class="ex-table">
      <thead><tr><th>ENGLISH</th><th>日本語</th></tr></thead>
      <tbody>${u.ex.map(e=>`
      <tr>
        <td><div class="en-cell">${e.en}</div></td>
        <td><div class="ja-cell">${e.ja}</div></td>
      </tr>`).join('')}</tbody>
    </table>
  </div>

  <div class="quiz-card">
    <div class="quiz-header">TRANSLATION DRILL — 日→英 翻訳練習（各5問）</div>
    ${u.quiz.map((q,qi)=>`
    <div class="q-item">
      <div class="q-num">Q${qi+1}</div>
      <div class="q-text">次の日本語を英語にしてください</div>
      <div class="q-jp">「${q.ja}」</div>
      <button class="reveal-btn" onclick="toggleAns(this)">REVEAL ANSWER</button>
      <div class="answer">
        <div class="ans-en">${q.en}</div>
        <div class="ans-note">NOTE: ${q.note}</div>
      </div>
    </div>`).join('')}
    <div class="btn-row" style="margin-top:1.2rem">
      <button class="btn btn-done" onclick="markDone(${i})">✓ UNIT COMPLETE</button>
    </div>
  </div>

  <div class="btn-row">
    ${i>0?`<button class="btn btn-outline" onclick="showUnit(${i-1})">← PREV</button>`:''}
    ${i<units.length-1?`<button class="btn btn-primary" onclick="showUnit(${i+1})">NEXT →</button>`:
    `<div class="complete-banner" style="flex:1"><h3>ALL 16 UNITS COMPLETE</h3><p>全ユニット修了おめでとうございます！</p></div>`}
  </div>`;
}

function showUnit(i){
  current = i;
  document.getElementById('main').innerHTML = buildUnit(i);
  buildNav();
  document.getElementById('main').scrollTop = 0;
  window.scrollTo(0,0);
}

function toggleAns(btn){
  const ans = btn.nextElementSibling;
  const shown = ans.classList.toggle('shown');
  btn.textContent = shown ? 'HIDE' : 'REVEAL ANSWER';
}

function markDone(i){
  done.add(i);
  const pct = Math.round(done.size/units.length*100);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-label-val').textContent = `${done.size} / ${units.length}`;
  buildNav();
  if(i < units.length-1) showUnit(i+1);
}

buildNav();
showUnit(0);
</script>
</body>
</html>
