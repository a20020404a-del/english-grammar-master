<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英文法完全マスター</title>
<style>
:root {
  --primary: #4F46E5;
  --primary-light: #818CF8;
  --accent: #10B981;
  --bg: #F8FAFC;
  --card: #FFFFFF;
  --text: #1E293B;
  --muted: #64748B;
  --border: #E2E8F0;
  --correct: #D1FAE5;
  --correct-border: #10B981;
  --reveal-bg: #EFF6FF;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

/* Sidebar */
#sidebar {
  width: 260px; min-width: 260px; background: var(--primary); color: white;
  height: 100vh; position: sticky; top: 0; overflow-y: auto; padding-bottom: 2rem;
}
#sidebar h1 { font-size: 1.1rem; padding: 1.5rem 1rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.2); line-height: 1.4; }
#sidebar h1 span { font-size: 0.75rem; display: block; opacity: 0.7; margin-top: 0.3rem; }
.nav-item {
  display: flex; align-items: center; gap: 0.6rem; padding: 0.65rem 1rem;
  cursor: pointer; transition: background 0.15s; font-size: 0.85rem; border-left: 3px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,0.1); }
.nav-item.active { background: rgba(255,255,255,0.15); border-left-color: #A5F3FC; }
.nav-num { background: rgba(255,255,255,0.2); border-radius: 4px; padding: 1px 6px; font-size: 0.75rem; min-width: 24px; text-align: center; }
.nav-item.done .nav-num { background: var(--accent); }

/* Main */
#main { flex: 1; padding: 2rem; max-width: 900px; }
.unit { display: none; }
.unit.active { display: block; }

.unit-header { margin-bottom: 1.5rem; }
.unit-tag { font-size: 0.75rem; color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
.unit-header h2 { font-size: 1.8rem; margin: 0.3rem 0 0.5rem; }
.unit-header p { color: var(--muted); font-size: 0.95rem; line-height: 1.6; }

.section { background: var(--card); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.2rem; border: 1px solid var(--border); }
.section h3 { font-size: 1rem; color: var(--primary); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.4rem; }
.section h3::before { content: ''; display: inline-block; width: 4px; height: 16px; background: var(--primary); border-radius: 2px; }

.point-list { list-style: none; }
.point-list li { padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; line-height: 1.6; }
.point-list li:last-child { border-bottom: none; }
.point-list li strong { color: var(--primary); }

.example-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
.example-table th { background: var(--bg); padding: 0.5rem 0.75rem; text-align: left; font-size: 0.8rem; color: var(--muted); border-bottom: 2px solid var(--border); }
.example-table td { padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border); vertical-align: top; }
.example-table tr:last-child td { border-bottom: none; }
.en { font-weight: 600; color: var(--text); }
.ja { color: var(--muted); font-size: 0.83rem; }

/* Formula boxes */
.formula { background: #EEF2FF; border-left: 4px solid var(--primary); border-radius: 0 8px 8px 0; padding: 0.75rem 1rem; margin: 0.75rem 0; font-size: 0.9rem; }
.formula code { font-family: monospace; font-size: 0.95rem; color: var(--primary); }

/* Quiz */
.quiz-section { background: var(--card); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.2rem; border: 2px solid var(--primary-light); }
.quiz-section h3 { font-size: 1rem; color: var(--primary); margin-bottom: 1.2rem; }
.quiz-item { margin-bottom: 1rem; background: var(--bg); border-radius: 8px; padding: 1rem; }
.quiz-item .q-text { font-size: 0.92rem; margin-bottom: 0.6rem; }
.quiz-item .q-num { display: inline-block; background: var(--primary); color: white; border-radius: 4px; padding: 1px 7px; font-size: 0.75rem; margin-right: 0.4rem; }
.reveal-btn {
  background: white; border: 1.5px solid var(--primary); color: var(--primary);
  border-radius: 6px; padding: 0.35rem 0.9rem; font-size: 0.82rem; cursor: pointer;
  transition: all 0.15s; margin-top: 0.4rem;
}
.reveal-btn:hover { background: var(--primary); color: white; }
.answer { display: none; margin-top: 0.6rem; background: var(--reveal-bg); border-radius: 6px; padding: 0.6rem 0.8rem; font-size: 0.9rem; }
.answer.shown { display: block; }
.answer .ans-en { font-weight: 700; color: var(--primary); }
.answer .ans-note { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; }

.nav-btns { display: flex; gap: 1rem; margin-top: 1.5rem; }
.btn { padding: 0.6rem 1.4rem; border-radius: 8px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all 0.15s; }
.btn-outline { background: white; border: 1.5px solid var(--primary); color: var(--primary); }
.btn-outline:hover { background: var(--primary); color: white; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: #3730A3; }

.progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin: 0.5rem 0 1.5rem; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }

@media (max-width: 768px) {
  body { flex-direction: column; }
  #sidebar { width: 100%; height: auto; position: relative; }
  #sidebar nav { display: flex; flex-wrap: wrap; padding: 0.5rem; gap: 0.3rem; }
  .nav-item { border-radius: 6px; border-left: none; font-size: 0.78rem; padding: 0.4rem 0.6rem; }
  #main { padding: 1rem; }
}
</style>
</head>

<nav id="sidebar">

      { label: "進行形", text: "<strong>be + ing:</strong> 今まさに進行中の動作。過去・未来の進行形もある。<br><strong>例:</strong> I was sleeping when he called." },
    ],
    examples: [
      { en: "I have lived in Tokyo for five years.", ja: "私は5年間東京に住んでいます。（継続）" },
      { en: "She was cooking when I arrived.", ja: "私が到着したとき、彼女は料理をしていました。（過去進行）" },
      { en: "I'm going to visit my parents next week.", ja: "来週、両親を訪ねる予定です。（計画）" },
      { en: "Have you finished your homework yet?", ja: "もう宿題は終わりましたか？（完了）" },
      { en: "It will probably rain tomorrow.", ja: "明日はおそらく雨が降るでしょう。（予測）" },
    ],
    quiz: [
      { ja: "私は3年間この会社で働いています。", en: "I have worked at this company for three years.", note: "現在完了（継続）: have + 過去分詞 + for" },
      { ja: "彼女は昨日その映画を見ました。", en: "She watched that movie yesterday.", note: "過去形: yesterday と共に使う" },
      { ja: "あなたは今何をしていますか？", en: "What are you doing now?", note: "現在進行形: be + ing" },
      { ja: "私は来月京都に行く予定です。", en: "I am going to visit Kyoto next month.", note: "計画・予定 = be going to" },
      { ja: "私は今まで一度もフランスに行ったことがありません。", en: "I have never been to France.", note: "現在完了（経験）の否定: have never + 過去分詞" },
    ]
  },
  {
    title: "接続詞",
    subtitle: "等位接続詞・従属接続詞・相関接続詞",
    desc: "接続詞は語と語、節と節をつなぐ言葉。文の関係性（理由・条件・対比など）を明確にします。",
    points: [
      { label: "等位接続詞（対等につなぐ）", text: "<strong>and</strong>（〜と・そして）/ <strong>but</strong>（しかし）/ <strong>or</strong>（または）/ <strong>so</strong>（だから）/ <strong>for</strong>（なぜなら）/ <strong>yet</strong>（しかし）/ <strong>nor</strong>（〜もない）" },
      { label: "従属接続詞（時・理由）", text: "<strong>when, while, after, before, until, as soon as</strong>（時）<br><strong>because, since, as</strong>（理由）" },
      { label: "従属接続詞（条件・譲歩）", text: "<strong>if, unless, as long as</strong>（条件）<br><strong>although, though, even though, even if</strong>（譲歩）" },
      { label: "相関接続詞", text: "<strong>both A and B</strong>（AとBの両方）/ <strong>either A or B</strong>（AかBのどちらか）/ <strong>neither A nor B</strong>（AもBも〜ない）/ <strong>not only A but also B</strong>（AだけでなくBも）" },
      { label: "接続副詞（文と文をつなぐ）", text: "<strong>however</strong>（しかしながら）/ <strong>therefore</strong>（したがって）/ <strong>moreover</strong>（さらに）/ <strong>for example</strong>（例えば）" },
    ],
    examples: [
      { en: "I was tired, but I kept working.", ja: "疲れていたけれど、働き続けました。" },
      { en: "She studies hard because she wants to pass the exam.", ja: "試験に合格したいので、一生懸命勉強します。" },
      { en: "Unless you hurry, you'll miss the train.", ja: "急がないと電車に乗り遅れますよ。" },
      { en: "Both my mother and my father are teachers.", ja: "母も父も先生です。" },
      { en: "It was raining; however, we enjoyed the event.", ja: "雨が降っていたが、イベントを楽しみました。" },
    ],
    quiz: [
      { ja: "彼は疲れていたので、早く寝ました。", en: "He went to bed early because he was tired.", note: "理由の接続詞 because" },
      { ja: "音楽も映画も好きです。（両方）", en: "I like both music and movies.", note: "相関接続詞 both A and B" },
      { ja: "一生懸命練習すれば、上手くなれます。", en: "If you practice hard, you will get better.", note: "条件の if（条件節は現在形）" },
      { ja: "彼は英語だけでなくフランス語も話せます。", en: "He can speak not only English but also French.", note: "相関接続詞 not only A but also B" },
      { ja: "私が駅に着いたとき、電車はすでに出発していました。", en: "When I arrived at the station, the train had already left.", note: "時の接続詞 when + 過去完了" },
    ]
  }
];

const navList = document.getElementById('nav-list');
const mainEl = document.getElementById('main');
const progressFill = document.getElementById('progress-fill');
const progressText = document.getElementById('progress-text');
let done = new Set();
let current = 0;

function renderNav() {
  navList.innerHTML = '';
  units.forEach((u, i) => {
    const el = document.createElement('div');
    el.className = 'nav-item' + (i === current ? ' active' : '') + (done.has(i) ? ' done' : '');
    el.innerHTML = `<span class="nav-num">${i+1}</span><span>${u.title}</span>`;
    el.onclick = () => showUnit(i);
    navList.appendChild(el);
  });
}

function renderUnit(i) {
  const u = units[i];
  return `
  <div class="unit active" id="unit-${i}">
    <div class="unit-header">
      <div class="unit-tag">Unit ${i+1} / 16</div>
      <h2>${u.title}</h2>
      <p>${u.subtitle} — ${u.desc}</p>
    </div>

    <div class="section">
      <h3>重要ポイント</h3>
      <ul class="point-list">
        ${u.points.map(p => `<li><strong>${p.label}</strong><br>${p.text}</li>`).join('')}
      </ul>
    </div>

    <div class="section">
      <h3>例文</h3>
      <table class="example-table">
        <thead><tr><th>英語</th><th>日本語</th></tr></thead>
        <tbody>
          ${u.examples.map(e => `<tr><td class="en">${e.en}</td><td class="ja">${e.ja}</td></tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div class="quiz-section">
      <h3>練習問題：日本語を英語にしよう（各5問）</h3>
      ${u.quiz.map((q, qi) => `
      <div class="quiz-item">
        <div class="q-text"><span class="q-num">Q${qi+1}</span> 次の日本語を英語にしてください：<br><strong>「${q.ja}」</strong></div>
        <button class="reveal-btn" onclick="toggleAnswer(this)">答えを見る</button>
        <div class="answer">
          <div class="ans-en">${q.en}</div>
          <div class="ans-note">📝 ${q.note}</div>
        </div>
      </div>`).join('')}
      <button class="btn btn-primary" style="margin-top:0.5rem" onclick="markDone(${i})">✓ このユニットを完了にする</button>
    </div>

    <div class="nav-btns">
      ${i > 0 ? `<button class="btn btn-outline" onclick="showUnit(${i-1})">← 前のユニット</button>` : ''}
      ${i < units.length-1 ? `<button class="btn btn-primary" onclick="showUnit(${i+1})">次のユニット →</button>` : '<div style="padding:.6rem 1.4rem;color:var(--accent);font-weight:700;">🎉 全ユニット完了！</div>'}
    </div>
  </div>`;
}

function showUnit(i) {
  current = i;
  mainEl.innerHTML = renderUnit(i);
  renderNav();
  window.scrollTo(0, 0);
}

function toggleAnswer(btn) {
  const ans = btn.nextElementSibling;
  if (ans.classList.contains('shown')) {
    ans.classList.remove('shown');
    btn.textContent = '答えを見る';
  } else {
    ans.classList.add('shown');
    btn.textContent = '隠す';
  }
}

function markDone(i) {
  done.add(i);
  const pct = Math.round(done.size / units.length * 100);
  progressFill.style.width = pct + '%';
  progressText.textContent = `${done.size} / ${units.length} 単元完了`;
  renderNav();
  if (i < units.length - 1) showUnit(i + 1);
}

showUnit(0);
</script>
</body>
</html>
