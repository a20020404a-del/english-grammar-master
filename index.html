<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英文法マスター | 全16ユニット</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Patrick+Hand&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf7f2;
  --paper:#fffef9;
  --border:#e8e0d4;
  --text:#2c2825;
  --muted:#7a6f66;
  --teal:#2b9e95;
  --coral:#e05c5c;
  --gold:#c89b2a;
  --green:#4a9e5c;
  --blue:#3b7dd8;
  --purple:#7c4dbd;
  --shadow:0 3px 16px rgba(0,0,0,0.07);
  --sidebar-w:260px;
}
body{
  font-family:'Zen Maru Gothic',sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:17px;
  line-height:1.85;
  min-height:100vh;
}
/* TOP NAV */
.sidebar{
  position:sticky;
  top:0;
  width:100%;
  background:linear-gradient(135deg,#2b9e95 0%,#1a8078 100%);
  color:#fff;
  z-index:100;
  box-shadow:0 3px 16px rgba(0,0,0,0.14);
}
.sidebar-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 24px 8px;
  gap:20px;
  flex-wrap:wrap;
}
.sidebar-title{
  font-size:1rem;
  font-weight:700;
  letter-spacing:0.02em;
  white-space:nowrap;
}
.sidebar-sub{
  font-size:0.72rem;
  opacity:0.75;
}
.progress-wrap{
  display:flex;
  align-items:center;
  gap:10px;
  margin-left:auto;
}
.progress-label{
  font-size:0.72rem;
  opacity:0.9;
  white-space:nowrap;
}
.progress-track{
  width:120px;
  height:6px;
  background:rgba(255,255,255,0.25);
  border-radius:999px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  background:#fff;
  border-radius:999px;
  transition:width 0.4s ease;
  width:0%;
}
/* unit pill nav */
.nav-list{
  list-style:none;
  display:flex;
  flex-wrap:wrap;
  gap:4px;
  padding:0 16px 10px;
}
.nav-item button{
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.25);
  color:#fff;
  padding:4px 11px;
  border-radius:999px;
  cursor:pointer;
  font-family:'Zen Maru Gothic',sans-serif;
  font-size:0.72rem;
  display:flex;
  align-items:center;
  gap:4px;
  transition:all 0.15s;
  white-space:nowrap;
  line-height:1.4;
}
.nav-item button:hover{
  background:rgba(255,255,255,0.28);
  transform:translateY(-1px);
}
.nav-item.active button{
  background:#fff;
  color:var(--teal);
  font-weight:700;
  border-color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
}
.nav-done{font-size:0.65rem;opacity:0.75;flex-shrink:0}
.nav-item.completed .nav-done::after{content:" ✓"}
.nav-item.completed button{opacity:0.8}
/* MAIN */
.main{
  padding:36px 44px 80px;
  max-width:980px;
  margin:0 auto;
  min-height:100vh;
}
/* UNIT HEADER */
.unit-header{margin-bottom:30px}
.unit-badge{
  font-family:'Caveat',cursive;
  font-size:0.9rem;
  color:var(--teal);
  font-weight:600;
  letter-spacing:0.08em;
  display:block;
  margin-bottom:4px;
}
.unit-emoji{font-size:2rem;display:block;margin-bottom:6px}
.unit-title{font-size:1.75rem;font-weight:700;color:var(--text);line-height:1.2}
.unit-subtitle{
  display:inline-block;
  font-size:0.78rem;
  color:var(--teal);
  background:rgba(43,158,149,0.1);
  border-radius:999px;
  padding:2px 12px;
  margin-top:6px;
}
/* GRAM SECTION */
.gram-section{
  background:var(--paper);
  border-radius:14px;
  box-shadow:var(--shadow);
  padding:28px 32px;
  margin-bottom:24px;
  border-left:5px solid var(--teal);
  position:relative;
}
.gram-section.coral{border-left-color:var(--coral)}
.gram-section.gold{border-left-color:var(--gold)}
.gram-section.blue{border-left-color:var(--blue)}
.gram-section.green{border-left-color:var(--green)}
.gram-section.purple{border-left-color:var(--purple)}
.sec-num{
  position:absolute;
  top:-14px;left:24px;
  width:28px;height:28px;
  border-radius:50%;
  background:var(--teal);
  color:#fff;
  font-weight:700;font-size:14px;
  display:flex;align-items:center;justify-content:center;
}
.gram-section.coral .sec-num{background:var(--coral)}
.gram-section.gold .sec-num{background:var(--gold)}
.gram-section.blue .sec-num{background:var(--blue)}
.gram-section.green .sec-num{background:var(--green)}
.gram-section.purple .sec-num{background:var(--purple)}
.sec-title{
  font-size:1.05rem;
  font-weight:700;
  color:var(--text);
  margin-bottom:10px;
}
.sec-body{
  font-size:0.88rem;
  line-height:1.8;
  color:var(--text);
  margin-bottom:12px;
}
/* ILLUSTRATION BOX */
.illus-box{
  background:linear-gradient(135deg,#fff9e6 0%,#fff4d0 100%);
  border:2px dashed #e6d49a;
  border-radius:12px;
  padding:18px 22px;
  margin:14px 0;
  display:flex;
  align-items:center;
  gap:18px;
}
.illus-svg{flex-shrink:0}
.illus-text{font-size:0.84rem;line-height:1.7;color:var(--text)}
.illus-text strong{color:var(--teal)}
/* SENTENCE DIAGRAM */
.sent-diagram{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  margin:14px 0;padding:14px 16px;
  background:#f0faf8;border-radius:10px;
}
.block-s{padding:6px 14px;border-radius:6px;font-weight:700;font-size:15px;color:#fff;background:var(--teal)}
.block-v{padding:6px 14px;border-radius:6px;font-weight:700;font-size:15px;color:#fff;background:var(--coral)}
.block-o{padding:6px 14px;border-radius:6px;font-weight:700;font-size:15px;color:#fff;background:var(--blue)}
.block-c{padding:6px 14px;border-radius:6px;font-weight:700;font-size:15px;color:#fff;background:var(--purple)}
.block-adv{padding:6px 14px;border-radius:6px;font-weight:700;font-size:15px;color:#fff;background:var(--green)}
.block-label{font-size:11px;font-weight:400;opacity:0.85;display:block;text-align:center;margin-top:2px}
.diag-arrow{color:var(--muted);font-size:1.1rem;font-weight:700}
.diag-block-wrap{display:flex;flex-direction:column;align-items:center}
/* POINT BOX */
.point-box{
  border-radius:8px;
  padding:14px 16px;
  margin:12px 0;
  font-size:0.86rem;
  line-height:1.75;
}
.point-box.rule{background:#e8f7f6;border-left:4px solid var(--teal)}
.point-box.mistake{background:#fef0f0;border-left:4px solid var(--coral)}
.point-box.tip{background:#fffbe6;border-left:4px solid var(--gold)}
.point-box.note{background:#f0f4ff;border-left:4px solid var(--blue)}
.point-box-label{
  font-size:0.72rem;
  font-weight:700;
  letter-spacing:0.06em;
  margin-bottom:5px;
  font-family:'Caveat',cursive;
  font-size:0.9rem;
}
.point-box.rule .point-box-label{color:var(--teal)}
.point-box.mistake .point-box-label{color:var(--coral)}
.point-box.tip .point-box-label{color:var(--gold)}
.point-box.note .point-box-label{color:var(--blue)}
/* EXAMPLE CARD */
.ex-card{
  background:var(--paper);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px 16px;
  margin:8px 0;
  border-left:3px solid var(--teal);
}
.ex-card.coral{border-left-color:var(--coral)}
.ex-card.blue{border-left-color:var(--blue)}
.ex-card.green{border-left-color:var(--green)}
.ex-card.purple{border-left-color:var(--purple)}
.ex-en{
  font-family:'Patrick Hand',cursive;
  color:var(--teal);
  font-size:18px;
  display:block;
}
.ex-card.coral .ex-en{color:var(--coral)}
.ex-card.blue .ex-en{color:var(--blue)}
.ex-card.green .ex-en{color:var(--green)}
.ex-card.purple .ex-en{color:var(--purple)}
.ex-jp{
  font-size:14px;
  color:var(--muted);
  display:block;
  margin-top:2px;
}
/* COMPARISON TABLE */
.comp-table{
  width:100%;
  border-collapse:separate;
  border-spacing:8px;
  margin:12px 0;
}
.comp-table th{
  padding:8px 14px;
  font-size:0.8rem;
  font-weight:700;
  border-radius:6px;
}
.comp-table th.wrong-h{background:#fde8e8;color:var(--coral)}
.comp-table th.right-h{background:#e8f7e8;color:var(--green)}
.comp-table td{
  padding:10px 14px;
  border-radius:8px;
  font-size:0.86rem;
  vertical-align:top;
}
.comp-table td.wrong{background:#fff5f5;border:1px solid #f5c6c6}
.comp-table td.right{background:#f5fff5;border:1px solid #c6e8c6}
.comp-table .en-w{font-family:'Patrick Hand',cursive;color:var(--coral);font-size:16px}
.comp-table .en-r{font-family:'Patrick Hand',cursive;color:var(--green);font-size:16px}
.comp-table .note{font-size:12px;color:var(--muted);margin-top:3px;display:block}
/* TIMELINE */
.timeline-wrap{
  margin:14px 0;
  padding:16px;
  background:#f8f6ff;
  border-radius:10px;
}
.timeline-track{
  position:relative;
  height:4px;
  background:var(--border);
  border-radius:999px;
  margin:24px 8px 30px;
}
.timeline-dot{
  position:absolute;
  top:50%;
  transform:translate(-50%,-50%);
  width:14px;height:14px;
  border-radius:50%;
  background:var(--purple);
  border:2px solid #fff;
  box-shadow:0 0 0 2px var(--purple);
}
.timeline-dot.past{background:var(--muted);box-shadow:0 0 0 2px var(--muted)}
.timeline-dot.now{background:var(--teal);box-shadow:0 0 0 2px var(--teal)}
.timeline-dot.future{background:var(--blue);box-shadow:0 0 0 2px var(--blue)}
.timeline-label{
  position:absolute;
  top:14px;
  transform:translateX(-50%);
  font-size:11px;
  color:var(--muted);
  white-space:nowrap;
  text-align:center;
}
.timeline-label.above{top:auto;bottom:14px}
/* QUIZ */
.quiz-item{
  background:var(--paper);
  border-radius:10px;
  padding:14px 18px;
  margin:10px 0;
  cursor:pointer;
  border:1px solid var(--border);
  transition:box-shadow 0.15s;
}
.quiz-item:hover{box-shadow:var(--shadow)}
.quiz-q{
  font-size:0.88rem;
  font-weight:500;
  color:var(--text);
}
.quiz-q::before{
  content:"Q. ";
  color:var(--teal);
  font-weight:700;
  font-family:'Caveat',cursive;
  font-size:1rem;
}
.quiz-hint{font-size:0.72rem;color:var(--muted);margin-top:3px}
.quiz-answer{
  display:none;
  margin-top:10px;
  padding-top:10px;
  border-top:1px dashed var(--border);
  animation:fadeIn 0.2s ease;
}
.quiz-answer.open{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.quiz-ans-en{
  font-family:'Patrick Hand',cursive;
  color:var(--teal);
  font-size:1.05rem;
  display:block;
}
.quiz-ans-note{font-size:0.75rem;color:var(--muted);margin-top:3px;display:block}
.quiz-btn{
  display:inline-block;
  margin-top:6px;
  font-size:0.75rem;
  color:var(--teal);
  border:1px solid var(--teal);
  border-radius:999px;
  padding:3px 12px;
  background:transparent;
  cursor:pointer;
  font-family:'Zen Maru Gothic',sans-serif;
  transition:background 0.15s,color 0.15s;
}
.quiz-btn:hover{background:var(--teal);color:#fff}
/* DONE BUTTON */
.done-wrap{text-align:right;margin-top:10px;margin-bottom:40px}
.done-btn{
  background:var(--teal);
  color:#fff;
  border:none;
  border-radius:999px;
  padding:10px 28px;
  font-family:'Zen Maru Gothic',sans-serif;
  font-size:0.88rem;
  font-weight:700;
  cursor:pointer;
  transition:background 0.2s;
}
.done-btn:hover{background:#1e7a72}
.done-btn.done{background:var(--green)}
/* INTRO BOX */
.intro-box{
  background:linear-gradient(135deg,#e8f7f6,#f0faf9);
  border-radius:12px;
  padding:20px 24px;
  margin-bottom:28px;
  border:1px solid rgba(43,158,149,0.2);
  font-size:0.9rem;
  line-height:1.85;
}
/* FREQ SCALE */
.freq-scale{
  display:flex;
  align-items:center;
  gap:0;
  margin:12px 0;
  font-size:0.75rem;
  overflow-x:auto;
  padding-bottom:4px;
}
.freq-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  flex:1;
  min-width:60px;
}
.freq-bar{
  height:8px;
  width:100%;
  border-radius:4px;
  margin-bottom:4px;
}
.freq-word{font-weight:700;color:var(--text)}
.freq-pct{color:var(--muted)}
/* IRREGULAR TABLE */
.irreg-table{
  width:100%;
  border-collapse:collapse;
  font-size:0.84rem;
  margin:10px 0;
}
.irreg-table th{
  background:var(--teal);
  color:#fff;
  padding:7px 12px;
  font-weight:700;
  text-align:left;
}
.irreg-table td{
  padding:8px 12px;
  border-bottom:1px solid var(--border);
}
.irreg-table tr:last-child td{border-bottom:none}
.irreg-table .en-cell{font-family:'Patrick Hand',cursive;color:var(--teal);font-size:0.95rem}
/* FORMULA BOX */
.formula-box{
  background:linear-gradient(135deg,#f0f4ff,#e8f0ff);
  border-radius:10px;
  padding:14px 18px;
  margin:12px 0;
  font-family:'Caveat',cursive;
  font-size:1.1rem;
  color:var(--blue);
  font-weight:600;
  border:1px solid rgba(59,125,216,0.2);
  text-align:center;
}
/* SECTION DIVIDER */
.sec-divider{
  border:none;
  border-top:1px dashed var(--border);
  margin:20px 0;
}
/* RESPONSIVE */
@media(max-width:768px){
  .sidebar-header{padding:10px 14px 6px}
  .progress-wrap{margin-left:0}
  .progress-track{width:80px}
  .nav-list{padding:0 10px 8px;gap:3px}
  .nav-item button{padding:3px 8px;font-size:0.68rem}
  .main{padding:20px 16px 60px}
  .illus-box{flex-direction:column;gap:10px}
  .sent-diagram{gap:5px}
}
</style>
</head>
<body>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">英文法マスター</div>
    <div class="sidebar-sub">社会人のための全16ユニット</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-label">
      <span>学習進捗</span>
      <span id="prog-text">0 / 16</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill"></div>
    </div>
  </div>
  <ul class="nav-list" id="nav-list"></ul>
</nav>

<main class="main" id="main"></main>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const UNITS=[
{id:1,emoji:"📝",title:"主語・動詞・基本文型",sub:"否定文・疑問文を含む"},
{id:2,emoji:"🏷️",title:"名詞",sub:"可算・不可算名詞、冠詞、複数形"},
{id:3,emoji:"🎨",title:"形容詞",sub:"名詞修飾・補語・感情表現"},
{id:4,emoji:"⚡",title:"副詞",sub:"様態・頻度・程度・注意ペア"},
{id:5,emoji:"⚖️",title:"比較",sub:"原級・比較級・最上級"},
{id:6,emoji:"🚫",title:"否定",sub:"not / never / nobody / 部分否定"},
{id:7,emoji:"🔑",title:"助動詞",sub:"can / will / may / must / should"},
{id:8,emoji:"📍",title:"前置詞",sub:"in / on / at と方向・慣用表現"},
{id:9,emoji:"🔗",title:"関係詞（WH修飾）",sub:"who / which / that / where"},
{id:10,emoji:"🔄",title:"動詞ing系",sub:"動名詞・現在分詞・進行形"},
{id:11,emoji:"➡️",title:"To不定詞",sub:"名詞的・形容詞的・副詞的用法"},
{id:12,emoji:"✅",title:"過去分詞系",sub:"受動態・現在完了・分詞形容詞"},
{id:13,emoji:"🧩",title:"節",sub:"名詞節・副詞節・時制一致"},
{id:14,emoji:"❓",title:"疑問文",sub:"Yes/No・WH・付加疑問・間接疑問"},
{id:15,emoji:"⏰",title:"時制・時表現",sub:"現在・過去・未来・完了形"},
{id:16,emoji:"🌉",title:"接続詞",sub:"等位・従属・相関接続詞"},
];

// ── PROGRESS ──────────────────────────────────────────────────────────────────
let done=new Set(JSON.parse(localStorage.getItem('grammar_done')||'[]'));
function saveDone(){localStorage.setItem('grammar_done',JSON.stringify([...done]))}
function updateProgress(){
  const n=done.size;
  document.getElementById('prog-text').textContent=n+' / 16';
  document.getElementById('prog-fill').style.width=(n/16*100)+'%';
  document.querySelectorAll('.nav-item').forEach(el=>{
    const id=+el.dataset.id;
    el.classList.toggle('completed',done.has(id));
  });
}
function toggleDone(id){
  if(done.has(id))done.delete(id);else done.add(id);
  saveDone();updateProgress();
  const btn=document.getElementById('done-btn-'+id);
  if(btn){btn.textContent=done.has(id)?'✓ 完了済み':'このユニットを完了にする';btn.className='done-btn'+(done.has(id)?' done':'')}
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function buildNav(){
  const ul=document.getElementById('nav-list');
  UNITS.forEach(u=>{
    const li=document.createElement('li');
    li.className='nav-item';li.dataset.id=u.id;
    li.innerHTML=`<button onclick="showUnit(${u.id})"><span>${u.emoji}</span><span style="flex:1">${u.id}. ${u.title}</span><span class="nav-done"></span></button>`;
    ul.appendChild(li);
  });
}

// ── QUIZ TOGGLE ───────────────────────────────────────────────────────────────
function toggleQuiz(btn){
  const item=btn.closest('.quiz-item');
  const ans=item.querySelector('.quiz-answer');
  const open=ans.classList.toggle('open');
  btn.textContent=open?'隠す':'答えを見る';
}

// ── UNIT RENDERER ─────────────────────────────────────────────────────────────
function showUnit(id){
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',+el.dataset.id===id));
  const main=document.getElementById('main');
  main.innerHTML=renderUnit(id);
  main.scrollTop=0;
  window.scrollTo(0,0);
  updateProgress();
}

// ── UNIT CONTENT ──────────────────────────────────────────────────────────────
function renderUnit(id){
  const renders={
    1:unit1,2:unit2,3:unit3,4:unit4,5:unit5,6:unit6,7:unit7,8:unit8,
    9:unit9,10:unit10,11:unit11,12:unit12,13:unit13,14:unit14,15:unit15,16:unit16
  };
  return renders[id]?renders[id]():'';
}

function header(id){
  const u=UNITS[id-1];
  const isDone=done.has(id);
  return `<div class="unit-header">
  <span class="unit-badge">UNIT ${String(id).padStart(2,'0')}</span>
  <span class="unit-emoji">${u.emoji}</span>
  <h1 class="unit-title">${u.title}</h1>
  <span class="unit-subtitle">${u.sub}</span>
</div>`;
}

function doneBtn(id){
  const isDone=done.has(id);
  return `<div class="done-wrap"><button class="done-btn${isDone?' done':''}" id="done-btn-${id}" onclick="toggleDone(${id})">${isDone?'✓ 完了済み':'このユニットを完了にする'}</button></div>`;
}

function exCard(en,jp,color=''){
  return `<div class="ex-card${color?' '+color:''}"><span class="ex-en">${en}</span><span class="ex-jp">${jp}</span></div>`;
}

function quiz(questions){
  return `<div class="gram-section gold"><div class="sec-num" style="background:var(--gold)">Q</div>
<h3 class="sec-title">確認クイズ — 日本語を英語に訳してみよう</h3>
${questions.map(q=>`<div class="quiz-item">
  <div class="quiz-q">${q.q}</div>
  <div class="quiz-hint">クリックして答えを確認</div>
  <button class="quiz-btn" onclick="toggleQuiz(this)">答えを見る</button>
  <div class="quiz-answer"><span class="quiz-ans-en">${q.a}</span><span class="quiz-ans-note">${q.n}</span></div>
</div>`).join('')}
</div>`;
